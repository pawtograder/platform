name: Lint
permissions:
  contents: read
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
jobs:
  lint:
    runs-on: pawtograder-ci
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node-22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node-22-
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Run linting check
        run: npm run lint

  # Jest unit tests (no DB, no Next server) — the full tests/unit/ suite. Covers exam OCR
  # region math / page splitting, rubric parsing, gradebook expressions, export selectors,
  # the llm-hint route, etc. The tests/unit/issue-* Supabase integration tests self-skip
  # here (RUN_SUPABASE_INTEGRATION_TESTS is not set) and run for real against a live DB in
  # the deploy workflow; the placeholder Supabase env below only lets their module-load
  # admin-client construction succeed so they reach the self-skip instead of throwing.
  unit-tests:
    runs-on: pawtograder-ci
    strategy:
      matrix:
        node-version: [22.x]
    steps:
      - uses: actions/checkout@v4
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node-22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node-22-
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Run Jest unit tests
        env:
          # Placeholder values so module-load createClient/createAdminClient asserts pass;
          # no real connection is made (integration tests self-skip without
          # RUN_SUPABASE_INTEGRATION_TESTS).
          SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          SUPABASE_ANON_KEY: test-anon-key
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
        run: npm run test:unit

  # Fast, deterministic unit tests for the gradebook recalc computation (the math the
  # gradebook-calculations e2e fixtures exercise end-to-end through the async pipeline).
  # These run the real edge-function expression functions directly — no DB, no pipeline.
  deno-unit-tests:
    runs-on: pawtograder-ci
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Run Deno unit tests
        run: npm run test:functions
