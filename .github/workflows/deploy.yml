name: Deploy Branch Preview & E2E
on:
  push:
    branches:
      - main
      - staging
  pull_request_target:
  workflow_dispatch:

# Secure baseline: no permissions. Jobs that need them override explicitly.
permissions: {}

jobs:
  # Deploys a Coolify branch preview. Runs in parallel with e2e-local — not a
  # blocker for E2E anymore, so tests can fail/pass without waiting on Coolify.
  deploy-preview:
    runs-on: pawtograder-ci
    environment: staging
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node-22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node-22-
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy a branch preview environment
        id: deploy
        uses: pawtograder/coolify-supabase-deployment-action@main
        with:
          ephemeral: false
          coolify_api_url: https://coolify.in.ripley.cloud/api/v1
          coolify_server_uuid: ${{ secrets.COOLIFY_SERVER_UUID }}
          coolify_api_token: ${{ secrets.COOLIFY_API_TOKEN }}
          coolify_project_uuid: ${{ secrets.COOLIFY_PROJECT_UUID }}
          coolify_environment_name: ${{ vars.COOLIFY_ENVIRONMENT_NAME }}
          coolify_environment_uuid: ${{ secrets.COOLIFY_ENVIRONMENT_UUID }}
          coolify_supabase_api_url: ${{ secrets.COOLIFY_SUPABASE_API_URL }}
          deployment_app_uuid: ${{ secrets.COOLIFY_DEPLOYMENT_APP_UUID }}
          bugsink_dsn: ${{ secrets.BUGSINK_DSN }}
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          frontend_image_repo: ghcr.io/${{ github.repository_owner }}/platform-frontend
          dockerfile_path: ./Dockerfile
          docker_registry_username: ${{ github.actor }}
          docker_registry_password: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_APP_ID: ${{ secrets.PAWTOGRADER_GITHUB_APP_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.PAWTOGRADER_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.PAWTOGRADER_GITHUB_OAUTH_CLIENT_SECRET }}
          GITHUB_PRIVATE_KEY_STRING: ${{ secrets.PAWTOGRADER_GITHUB_PRIVATE_KEY_STRING }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

  # Local-Supabase E2E. Spins up a clean dev environment on the runner and runs
  # the Playwright suite against it — independent of the Coolify preview above.
  e2e-local:
    runs-on: pawtograder-ci
    timeout-minutes: 75
    permissions:
      contents: read
    env:
      SUPABASE_PROJECT: pawtograder-platform
      STORAGE_MIGRATION: 20260217000000_binary_submission_files.sql
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node-22-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node-22-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx', '!**/node_modules/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Start local Supabase (fresh, no backup restore)
        run: |
          set -euo pipefail
          # Stop any previous run without saving a backup, then drop lingering volumes.
          npx supabase stop --no-backup || true
          docker volume ls --filter label=com.supabase.cli.project=${SUPABASE_PROJECT} -q \
            | xargs -r docker volume rm || true

          # Work around a known migration that fails under the supabase CLI's DB role
          # (it creates RLS policies on storage.objects which only the superuser owns).
          mv "supabase/migrations/${STORAGE_MIGRATION}" "/tmp/${STORAGE_MIGRATION}"

          npx supabase start

          # Apply the held-back migration as superuser and record it.
          docker exec -i "supabase_db_${SUPABASE_PROJECT}" psql -U postgres -d postgres \
            < "/tmp/${STORAGE_MIGRATION}"
          docker exec -i "supabase_db_${SUPABASE_PROJECT}" psql -U postgres -d postgres -c \
            "INSERT INTO supabase_migrations.schema_migrations (version, name) VALUES ('20260217000000', 'binary_submission_files') ON CONFLICT DO NOTHING;"

          # Restore the file so the checkout is clean.
          mv "/tmp/${STORAGE_MIGRATION}" "supabase/migrations/${STORAGE_MIGRATION}"

          # Audit table is partitioned; seed today's partition (and the next 7 days).
          docker exec -i "supabase_db_${SUPABASE_PROJECT}" psql -U postgres -d postgres -c \
            "SELECT public.audit_maintain_partitions();"

      - name: Write .env.local
        env:
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
        run: |
          set -euo pipefail
          eval "$(npx supabase status -o env)"
          cat > .env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${API_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_URL=${API_URL}
          SUPABASE_ANON_KEY=${ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SERVICE_ROLE_KEY}
          ENABLE_SIGNUPS=true
          NEXT_PUBLIC_PAWTOGRADER_WEB_URL=http://localhost:3001
          E2E_ENABLE=true
          END_TO_END_SECRET=not-a-secret
          EDGE_FUNCTION_SECRET=some-secret-value
          GITHUB_APP_ID=1
          EOF
          # GitHub App needs a parseable RSA key at Edge-Function boot; E2E tests
          # bypass GitHub, so a throwaway key is fine here.
          {
            echo 'GITHUB_PRIVATE_KEY_STRING="'
            openssl genrsa 2048 2>/dev/null
            echo '"'
          } >> .env.local

      - name: Build Next.js (prod, port 3001)
        env:
          NEXT_PUBLIC_PAWTOGRADER_WEB_URL: http://localhost:3001
        run: npm run build

      - name: Serve Edge Functions
        run: |
          nohup npx supabase functions serve --env-file .env.local \
            > /tmp/edge-functions.log 2>&1 &
          echo $! > /tmp/edge-functions.pid
          # Wait until the gateway is listening.
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:54321/functions/v1/ | grep -qE '^[0-9]{3}$'; then break; fi
            sleep 1
          done

      - name: Start Next.js prod server
        run: |
          nohup env PORT=3001 npm run start > /tmp/next-server.log 2>&1 &
          echo $! > /tmp/next-server.pid
          for i in $(seq 1 60); do
            if curl -s -o /dev/null -w '%{http_code}' http://localhost:3001/ | grep -qE '^[0-9]{3}$'; then break; fi
            sleep 1
          done

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:3001
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          eval "$(npx supabase status -o env)"
          export SUPABASE_URL="${API_URL}"
          export SUPABASE_ANON_KEY="${ANON_KEY}"
          export SUPABASE_SERVICE_ROLE_KEY="${SERVICE_ROLE_KEY}"
          export EDGE_FUNCTION_SECRET=some-secret-value
          export END_TO_END_SECRET=not-a-secret
          npx playwright test

      - name: Collect server logs on failure
        if: failure()
        run: |
          echo '--- edge-functions.log ---'; tail -n 500 /tmp/edge-functions.log || true
          echo '--- next-server.log ---';    tail -n 500 /tmp/next-server.log || true

      - name: Stop background services
        if: always()
        run: |
          kill "$(cat /tmp/edge-functions.pid 2>/dev/null)" 2>/dev/null || true
          kill "$(cat /tmp/next-server.pid 2>/dev/null)" 2>/dev/null || true
          npx supabase stop --no-backup || true

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
