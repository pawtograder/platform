name: Deploy Branch Preview
on:
  push:
    branches:
      - main
      - staging
  pull_request_target:
  workflow_dispatch:

# Secure baseline: no permissions. Jobs that need them override explicitly.
permissions: {}

jobs:
  # Determine if this is a trusted source (skip approval) or needs review
  check-trust:
    runs-on: ubuntu-latest
    outputs:
      trusted: ${{ steps.check.outputs.trusted }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" != "pull_request_target" ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.pull_request.head.repo.fork }}" == "true" ]]; then
            echo "Fork PRs cannot trigger deploy previews" >&2
            echo "trusted=false" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.pull_request.author_association }}" =~ ^(OWNER|MEMBER|COLLABORATOR)$ ]]; then
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "trusted=false" >> "$GITHUB_OUTPUT"
          fi

  # Trusted: deploy without approval gate
  deploy-trusted:
    needs: check-trust
    if: needs.check-trust.outputs.trusted == 'true'
    uses: ./.github/workflows/deploy-impl.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  # Untrusted: require staging environment approval first
  deploy-untrusted:
    needs: check-trust
    if: needs.check-trust.outputs.trusted == 'false'
    uses: ./.github/workflows/deploy-impl.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      environment: staging
