name: Deploy Branch Preview
on:
  push:
    branches:
      - main
      - staging
  pull_request_target:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: pawtograder-ci
    permissions:
      contents: read
      packages: write
    outputs:
      frontend_image: ${{ steps.image_name.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Set frontend image output
        id: image_name
        run: |
          IMAGE_REPO="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/platform-frontend"
          IMAGE_TAG="sha-${GITHUB_SHA}"
          FRONTEND_IMAGE="${IMAGE_REPO}:${IMAGE_TAG}"
          echo "frontend_image=${FRONTEND_IMAGE}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend image to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.image_name.outputs.frontend_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL || secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_GITHUB_OAUTH_CLIENT_ID=${{ secrets.PAWTOGRADER_GITHUB_OAUTH_CLIENT_ID }}
            NEXT_PUBLIC_PAWTOGRADER_WEB_URL=${{ vars.NEXT_PUBLIC_PAWTOGRADER_WEB_URL }}
            NEXT_PUBLIC_BUGSINK_DSN=${{ secrets.BUGSINK_DSN }}
            NEXT_PUBLIC_BUGSINK_HOST=${{ vars.NEXT_PUBLIC_BUGSINK_HOST }}
            NEXT_PUBLIC_POSTHOG_KEY=${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
            NEXT_PUBLIC_POSTHOG_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_HOST }}
            NEXT_PUBLIC_POSTHOG_UI_HOST=${{ vars.NEXT_PUBLIC_POSTHOG_UI_HOST }}
            NEXT_PUBLIC_ENABLE_SIGNUPS=${{ vars.NEXT_PUBLIC_ENABLE_SIGNUPS }}
            NEXT_PUBLIC_GIT_COMMIT_SHA=${{ github.sha }}
            SENTRY_RELEASE=${{ github.sha }}
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Deploy a branch preview environment
        id: deploy
        uses: pawtograder/coolify-supabase-deployment-action@main
        with:
          ephemeral: false
          coolify_api_url: https://coolify.in.ripley.cloud/api/v1
          coolify_server_uuid: ${{ secrets.COOLIFY_SERVER_UUID }}
          coolify_api_token: ${{ secrets.COOLIFY_API_TOKEN }}
          coolify_project_uuid: ${{ secrets.COOLIFY_PROJECT_UUID }}
          coolify_environment_name: ${{ vars.COOLIFY_ENVIRONMENT_NAME }}
          coolify_environment_uuid: ${{ secrets.COOLIFY_ENVIRONMENT_UUID }}
          coolify_supabase_api_url: ${{ secrets.COOLIFY_SUPABASE_API_URL }}
          deployment_app_uuid: ${{ secrets.COOLIFY_DEPLOYMENT_APP_UUID }}
          bugsink_dsn: ${{ secrets.BUGSINK_DSN }}
          discord_webhook_url: ${{ secrets.DISCORD_WEBHOOK_URL }}
        env:
          GITHUB_APP_ID: ${{ secrets.PAWTOGRADER_GITHUB_APP_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.PAWTOGRADER_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.PAWTOGRADER_GITHUB_OAUTH_CLIENT_SECRET }}
          GITHUB_PRIVATE_KEY_STRING: ${{ secrets.PAWTOGRADER_GITHUB_PRIVATE_KEY_STRING }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        env:
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          SUPABASE_URL: ${{ steps.deploy.outputs.supabase_url }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ steps.deploy.outputs.supabase_service_role_key }}
          SUPABASE_ANON_KEY: ${{ steps.deploy.outputs.supabase_anon_key }}
          BASE_URL: ${{ steps.deploy.outputs.app_url }}

          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
