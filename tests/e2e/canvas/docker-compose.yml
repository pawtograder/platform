# =============================================================================
# Bootable Canvas LMS stack for Pawtograder LTI 1.3 e2e testing.
#
#   web    - Canvas web app, running puma, served on host port ${CANVAS_HOST_PORT:-3001}
#   jobs   - Canvas delayed_jobs worker (same image) for async work (LTI/AGS,
#            grade passback, notifications, etc.)
#   postgres - PostgreSQL 14 (Canvas pins the pg *client* to 14)
#   redis    - Redis (Canvas cache_store + sessions)
#
# RAILS_ENV=development (see Dockerfile header for rationale: dev ships the
# pre-stubbed LTI signing keys needed for 1.3 launches and avoids prod-only
# SECRET_KEY_BASE/encryption wiring). The image is still asset-precompiled, so
# boot is fast.
#
# First boot:  docker compose up -d
#              ./bootstrap.sh          # creates DB + admin (idempotent)
#
# The image must already exist locally (run ./build.sh) or be pulled from GHCR.
# =============================================================================

x-canvas-env: &canvas-env
  RAILS_ENV: development
  # DB
  CANVAS_DATABASE_HOST: postgres
  CANVAS_DATABASE_USERNAME: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sekret}
  CANVAS_DATABASE_DEVELOPMENT: canvas_development
  # security.yml reads ENCRYPTION_KEY (must be >= 20 chars)
  ENCRYPTION_KEY: ${CANVAS_ENCRYPTION_KEY:-pawtograder_e2e_canvas_encryption_key_change_me}
  # Domain Canvas builds URLs/cookies for; must match how you reach it.
  CANVAS_DOMAIN: ${CANVAS_DOMAIN:-localhost}
  # Admin bootstrap (read by rake db:initial_setup -> db:configure_admin)
  CANVAS_LMS_ADMIN_EMAIL: ${CANVAS_LMS_ADMIN_EMAIL:-canvas@example.com}
  CANVAS_LMS_ADMIN_PASSWORD: ${CANVAS_LMS_ADMIN_PASSWORD:-canvas-password}
  CANVAS_LMS_ACCOUNT_NAME: ${CANVAS_LMS_ACCOUNT_NAME:-Pawtograder E2E}
  # Quieter logs / no telemetry prompt
  TELEMETRY_OPT_IN: "0"
  # db:initial_setup's configure_statistics_collection prompts interactively
  # unless this is set; without a TTY that prompt raises EOFError and aborts
  # setup. Pre-answer it so bootstrap runs non-interactively.
  CANVAS_LMS_STATS_COLLECTION: opt_out

services:
  postgres:
    image: postgres:14-bookworm
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sekret}
      # Canvas creates its own DBs; just need the cluster up.
      POSTGRES_DB: postgres
    volumes:
      - canvas-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    image: ${CANVAS_IMAGE:-ghcr.io/pawtograder/canvas-lms-e2e:2026-05-20.143}
    command: ["bundle", "exec", "puma", "-b", "tcp://0.0.0.0:3000"]
    environment: *canvas-env
    # Canvas (server-side) fetches the Pawtograder tool's public JWKS to verify
    # our LTI client assertions. The tool runs on the Docker host, so Canvas
    # reaches it via host.docker.internal — which needs an explicit mapping on
    # Linux.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CANVAS_HOST_PORT:-80}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - canvas-tmp:/usr/src/app/tmp
      - ./config/dynamic_settings.yml:/usr/src/app/config/dynamic_settings.yml:ro
    healthcheck:
      # /health_check returns 200 "canvas ok" only once Rails is fully booted
      # and the DB is reachable.
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health_check || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 120s

  jobs:
    image: ${CANVAS_IMAGE:-ghcr.io/pawtograder/canvas-lms-e2e:2026-05-20.143}
    command: ["bundle", "exec", "script/delayed_job", "run"]
    environment: *canvas-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    volumes:
      - canvas-tmp:/usr/src/app/tmp
      - ./config/dynamic_settings.yml:/usr/src/app/config/dynamic_settings.yml:ro

volumes:
  canvas-pg:
  canvas-tmp:
