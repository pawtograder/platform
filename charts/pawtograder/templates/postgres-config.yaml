{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "postgres-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  postgresql.conf: |
    # Generated by pawtograder Helm chart.
    listen_addresses = '*'
    shared_preload_libraries = '{{ join "," .Values.postgres.sharedPreloadLibraries }}'
    {{- range $k, $v := .Values.postgres.config }}
    {{ $k }} = {{ $v | quote }}
    {{- end }}
  pg_hba.conf: |
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            trust
    host    all             all             ::1/128                 trust
    host    all             all             10.0.0.0/8              md5
    host    all             all             172.16.0.0/12           md5
    host    all             all             192.168.0.0/16          md5
    host    replication     all             10.0.0.0/8              md5
  init-app-role.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ .Values.postgres.appRole }}') THEN
          CREATE ROLE {{ .Values.postgres.appRole }} LOGIN PASSWORD '$PAWTOGRADER_PASSWORD';
          GRANT {{ .Values.postgres.appRole }} TO postgres;
        END IF;
      END
      \$\$;
    EOSQL
{{- end }}
