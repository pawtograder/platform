{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "postgres-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
data:
  postgresql.conf: |
    # Generated by pawtograder Helm chart.
    listen_addresses = '*'
    shared_preload_libraries = '{{ join "," .Values.postgres.sharedPreloadLibraries }}'
    # pgsodium needs a 32-byte server secret key. The image installs the
    # extension but doesn't configure a key; the getkey_script reads our
    # PGSODIUM_ROOT_KEY (mounted from the JWT secret) at every server start.
    # supabase_vault reads its own GUC (vault.getkey_script) — the upstream
    # image points both at the same script, so do we. Without
    # vault.getkey_script set, vault.create_secret fails with
    # "pgsodium_derive: no server secret key defined" even though
    # pgsodium.derive_key() works directly.
    pgsodium.getkey_script = '/etc/postgresql/pgsodium_getkey.sh'
    vault.getkey_script = '/etc/postgresql/pgsodium_getkey.sh'
    # Image-level configs for supautils, wal-g, etc. Without this, supautils
    # GUCs (privileged_role, privileged_extensions_superuser, ...) read empty
    # and CREATE EXTENSION never gets superuser elevation.
    include_dir = '/etc/postgresql-custom'
    {{- range $k, $v := .Values.postgres.config }}
    {{ $k }} = {{ $v }}
    {{- end }}
  pg_hba.conf: |
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            trust
    host    all             all             ::1/128                 trust
    host    all             all             10.0.0.0/8              md5
    host    all             all             172.16.0.0/12           md5
    host    all             all             192.168.0.0/16          md5
    host    replication     all             10.0.0.0/8              md5
  # supabase_admin is created by initdb as the bootstrap superuser
  # (POSTGRES_USER=supabase_admin in the StatefulSet). No bootstrap script
  # needed for it; this placeholder is kept so we can stage other pre-migrate
  # SQL here later if needed.
  00-supabase-admin.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    echo "[init] supabase_admin already exists as bootstrap superuser; no-op"
  # pgsodium asks for the root key by spawning this script and reading
  # stdout — must be exactly 32 bytes (64 hex chars). Sourced from the
  # mounted secret file (populated from kv/apps/pawtograder-staging/jwt).
  pgsodium_getkey.sh: |
    #!/bin/sh
    # Pgsodium expects 64 hex chars (representing 32 bytes) on stdout —
    # NOT raw bytes. Key is stored in OpenBao as hex; just cat it, with
    # any trailing newline stripped (some env vars carry a \n).
    set -eu
    KEY_FILE=/var/run/secrets/pgsodium/PGSODIUM_ROOT_KEY
    if [ ! -f "$KEY_FILE" ]; then
      echo "pgsodium_getkey: $KEY_FILE missing" >&2
      exit 11
    fi
    HEX=$(tr -d '\n' < "$KEY_FILE")
    LEN=${#HEX}
    if [ "$LEN" -ne 64 ]; then
      echo "pgsodium_getkey: hex key is $LEN chars, expected 64" >&2
      exit 12
    fi
    printf '%s' "$HEX"
  # The pawtograder app role. Created without GRANT TO postgres because
  # `postgres` doesn't exist yet at this point — migrate.sh creates it
  # later. Renamed to zy- so it runs AFTER migrate.sh (which uses 'm') but
  # BEFORE zz-supabase-passwords.sh.
  init-app-role.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      DO \$\$
      BEGIN
        IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = '{{ .Values.postgres.appRole }}') THEN
          CREATE ROLE {{ .Values.postgres.appRole }} LOGIN PASSWORD '$PAWTOGRADER_PASSWORD';
        END IF;
      END
      \$\$;
    EOSQL
  # The image's migrate.sh creates supabase_auth_admin / supabase_storage_admin
  # / authenticator / etc. as roles WITHOUT passwords (the AMI build flow sets
  # them out-of-band). For docker, we need to set them ourselves so the auth /
  # storage components can authenticate. This script runs after migrate.sh
  # (lex sort: 'z' > 'm') so all the supabase admin roles already exist.
  zz-supabase-passwords.sh: |
    #!/usr/bin/env bash
    set -euo pipefail
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      ALTER USER authenticator                 WITH PASSWORD '$POSTGRES_PASSWORD';
      ALTER USER supabase_auth_admin           WITH PASSWORD '$POSTGRES_PASSWORD';
      ALTER USER supabase_storage_admin        WITH PASSWORD '$POSTGRES_PASSWORD';
      ALTER USER supabase_replication_admin    WITH PASSWORD '$POSTGRES_PASSWORD';
      ALTER USER supabase_etl_admin            WITH PASSWORD '$POSTGRES_PASSWORD';
      ALTER USER supabase_read_only_user       WITH PASSWORD '$POSTGRES_PASSWORD';
      -- pgbouncer/supabase_functions_admin only exist on some image variants
      DO \$\$
      BEGIN
        IF EXISTS (SELECT FROM pg_roles WHERE rolname = 'pgbouncer') THEN
          EXECUTE format('ALTER USER pgbouncer WITH PASSWORD %L', '$POSTGRES_PASSWORD');
        END IF;
        IF EXISTS (SELECT FROM pg_roles WHERE rolname = 'supabase_functions_admin') THEN
          EXECUTE format('ALTER USER supabase_functions_admin WITH PASSWORD %L', '$POSTGRES_PASSWORD');
        END IF;
      END
      \$\$;
      -- Extensions pawtograder migrations USE but don't CREATE. Must be
      -- installed at init time so the migration set can reference them.
      -- pg_net is preloaded via shared_preload_libraries; without
      -- CREATE EXTENSION the SQL functions in schema 'net' don't exist.
      CREATE EXTENSION IF NOT EXISTS pg_net;
    EOSQL
{{- end }}
