{{- /*
ExternalSecret that materializes the shared seed-user password from
OpenBao at kv/apps/pawtograder/preview-shared into the namespace as
`pawtograder-preview-shared`. The seed job consumes SEED_USER_PASSWORD
from this Secret and rewrites the demo users' encrypted_password so
reviewers can actually log in to a fresh preview.

Provision the upstream Bao path once per cluster via
scripts/setup-openbao-preview-shared.sh. Then enable here:

  seed:
    externalSecret:
      enabled: true

Singleton path (not per-env) — previews are equally untrusted and the
goal is "reviewers log in to ANY preview with the same documented sample
account." Per-env scoping would multiply Bao paths without changing the
trust posture.
*/ -}}
{{- if and .Values.seed.enabled .Values.seed.externalSecret.enabled }}
{{- $storeName := .Values.seed.externalSecret.storeName | default "openbao" -}}
{{- $storeKind := .Values.seed.externalSecret.storeKind | default "ClusterSecretStore" -}}
{{- $baoPath   := .Values.seed.externalSecret.path | default "apps/pawtograder/preview-shared" -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pawtograder-preview-shared
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.seed.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: pawtograder-preview-shared
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $baoPath }}
{{- end }}
