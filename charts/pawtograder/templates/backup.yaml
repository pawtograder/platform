{{- if and .Values.postgres.enabled .Values.backup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "backup") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "backup") | nindent 4 }}
spec:
  schedule: {{ .Values.backup.schedule | quote }}
  concurrencyPolicy: Forbid
  # Skip (and mark missed) a run that couldn't start within this window of
  # its slot, instead of piling up stale runs after controller downtime.
  startingDeadlineSeconds: {{ .Values.backup.startingDeadlineSeconds | default 1800 }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      # Hard ceiling so a wedged dump/upload fails loudly rather than
      # running forever (Forbid would then silently skip every later run).
      activeDeadlineSeconds: {{ .Values.backup.activeDeadlineSeconds | default 3600 }}
      template:
        metadata:
          labels:
            {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "backup") | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
          {{- include "pawtograder.imagePullSecrets" . | nindent 10 }}
          containers:
            - name: backup
              image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.backup.image) }}
              # Run under bash, not sh: the supabase/postgres image's /bin/sh is
              # dash, which rejects `set -o pipefail` ("Illegal option -o
              # pipefail", exit 2) — without pipefail a failing pg_dump piped to
              # gzip would also be masked. bash ships in the image.
              command:
                - bash
                - -c
                - |
                  set -euo pipefail
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  # Custom format (-Fc): compressed, and — unlike plain SQL —
                  # structurally verifiable offline via `pg_restore --list`
                  # (which the backup-verify CronJob runs weekly against the
                  # newest object). Restore with:
                  #   pg_restore --clean --if-exists --no-owner --no-acl -d <db> <file>
                  FILE="/tmp/pawtograder-${TS}.dump"
                  pg_dump -Fc > "$FILE"
                  # Verify the archive's TOC parses BEFORE uploading — a
                  # truncated/corrupt dump must fail here, not on restore day.
                  pg_restore --list "$FILE" > /dev/null
                  echo "[backup] dump OK: $(stat -c%s "$FILE") bytes"
                  # Install mc into the supabase/postgres image at runtime.
                  # Ideally mc would be baked into the image (no network
                  # dependency, no MITM surface), but the chart can't
                  # rebuild the postgres image; pin the binary by SHA256
                  # so a tampered download is rejected. Bump the URL +
                  # checksum together by setting backup.mc.url and
                  # backup.mc.sha256 in your values.
                  apt-get update && apt-get install -y --no-install-recommends curl ca-certificates
                  curl -fsSL "{{ .Values.backup.mc.url }}" -o /usr/local/bin/mc
                  echo "{{ .Values.backup.mc.sha256 }}  /usr/local/bin/mc" | sha256sum -c -
                  chmod +x /usr/local/bin/mc
                  mc alias set s3 "${S3_ENDPOINT}" "${AWS_ACCESS_KEY_ID}" "${AWS_SECRET_ACCESS_KEY}"
                  REMOTE="s3/${S3_BUCKET}/$(basename "$FILE")"
                  mc cp "$FILE" "$REMOTE"
                  # Post-upload integrity: the object must exist remotely at
                  # exactly the local size (catches truncated multipart uploads).
                  LOCAL_SIZE=$(stat -c%s "$FILE")
                  REMOTE_SIZE=$(mc stat --json "$REMOTE" | grep -o '"size":[0-9]*' | head -1 | cut -d: -f2)
                  if [ "$LOCAL_SIZE" != "$REMOTE_SIZE" ]; then
                    echo "[backup] FATAL: size mismatch after upload (local=$LOCAL_SIZE remote=${REMOTE_SIZE:-missing})"
                    exit 1
                  fi
                  echo "[backup] uploaded + size-verified $REMOTE"
                  # Retention is enforced via a bucket ILM expiry rule. Adding
                  # a duplicate errors, so add only when absent — but a bucket
                  # with NO expiry rule and a failing add is a hard error
                  # (silent retention loss otherwise).
                  if ! mc ilm rule ls "s3/${S3_BUCKET}" 2>/dev/null | grep -qi expir; then
                    mc ilm rule add --expiry-days {{ .Values.backup.retentionDays }} "s3/${S3_BUCKET}"
                    echo "[backup] created ILM expiry rule ({{ .Values.backup.retentionDays }}d)"
                  fi
              env:
                - name: PGHOST
                  value: {{ include "pawtograder.postgres.host" . }}
                - name: PGPORT
                  value: {{ .Values.postgres.service.port | quote }}
                - name: PGDATABASE
                  value: {{ .Values.postgres.database | quote }}
                - name: PGUSER
                  value: postgres
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.names.postgres }}
                      key: POSTGRES_PASSWORD
                - name: S3_ENDPOINT
                  value: {{ required "backup.s3.endpoint is required when backup.enabled=true" .Values.backup.s3.endpoint | quote }}
                - name: S3_BUCKET
                  value: {{ required "backup.s3.bucket is required when backup.enabled=true" .Values.backup.s3.bucket | quote }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.names.s3 }}
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.secrets.names.s3 }}
                      key: AWS_SECRET_ACCESS_KEY
{{- end }}
