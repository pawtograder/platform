{{- /*
Optional rendered Secrets. Production deployments should set
secrets.create=false and supply Secrets out-of-band (ESO, sealed-secrets, etc.).
*/ -}}
{{- if .Values.secrets.create -}}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.names.postgres }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.values.postgres.password is required when secrets.create=true" .Values.secrets.values.postgres.password | quote }}
  PAWTOGRADER_PASSWORD: {{ required "secrets.values.postgres.pawtograderPassword is required when secrets.create=true" .Values.secrets.values.postgres.pawtograderPassword | quote }}
  REPLICATION_PASSWORD: {{ default "" .Values.secrets.values.postgres.replicationPassword | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.names.jwt }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.values.jwt.secret is required when secrets.create=true" .Values.secrets.values.jwt.secret | quote }}
  ANON_KEY: {{ required "secrets.values.jwt.anonKey is required when secrets.create=true" .Values.secrets.values.jwt.anonKey | quote }}
  SERVICE_ROLE_KEY: {{ required "secrets.values.jwt.serviceRoleKey is required when secrets.create=true" .Values.secrets.values.jwt.serviceRoleKey | quote }}
  JWT_PRIVATE_JWKS: {{ required "secrets.values.jwt.privateJwks is required when secrets.create=true" .Values.secrets.values.jwt.privateJwks | quote }}
  JWT_PUBLIC_JWKS: {{ required "secrets.values.jwt.publicJwks is required when secrets.create=true" .Values.secrets.values.jwt.publicJwks | quote }}
  JWT_REALTIME_JWKS: {{ required "secrets.values.jwt.realtimeJwks is required when secrets.create=true" .Values.secrets.values.jwt.realtimeJwks | quote }}
  REALTIME_ENC_KEY: {{ required "secrets.values.jwt.realtimeEncKey is required when secrets.create=true" .Values.secrets.values.jwt.realtimeEncKey | quote }}
  PG_META_CRYPTO_KEY: {{ required "secrets.values.jwt.pgMetaCryptoKey is required when secrets.create=true" .Values.secrets.values.jwt.pgMetaCryptoKey | quote }}
  PGSODIUM_ROOT_KEY: {{ required "secrets.values.jwt.pgsodiumRootKey is required when secrets.create=true" .Values.secrets.values.jwt.pgsodiumRootKey | quote }}
{{- if .Values.edgeFunctions.e2e.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: pawtograder-e2e
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
type: Opaque
stringData:
  END_TO_END_SECRET: {{ required "secrets.values.e2e.endToEndSecret is required when edgeFunctions.e2e.enabled=true" .Values.secrets.values.e2e.endToEndSecret | quote }}
  EDGE_FUNCTION_SECRET: {{ required "secrets.values.e2e.edgeFunctionSecret is required when edgeFunctions.e2e.enabled=true" .Values.secrets.values.e2e.edgeFunctionSecret | quote }}
{{- end }}
{{- if .Values.auth.smtp.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.names.smtp }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
type: Opaque
stringData:
  SMTP_HOST: {{ .Values.secrets.values.smtp.host | quote }}
  SMTP_PORT: {{ .Values.secrets.values.smtp.port | quote }}
  SMTP_USER: {{ .Values.secrets.values.smtp.user | quote }}
  SMTP_PASS: {{ .Values.secrets.values.smtp.pass | quote }}
  SMTP_ADMIN_EMAIL: {{ .Values.secrets.values.smtp.adminEmail | quote }}
  SMTP_SENDER_NAME: {{ .Values.secrets.values.smtp.senderName | quote }}
{{- end }}
{{- if eq .Values.storage.backend "s3" }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.names.s3 }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: {{ required "secrets.values.s3.accessKey required when storage.backend=s3" .Values.secrets.values.s3.accessKey | quote }}
  AWS_SECRET_ACCESS_KEY: {{ required "secrets.values.s3.secretKey required when storage.backend=s3" .Values.secrets.values.s3.secretKey | quote }}
{{- end }}
{{- end }}
