{{- if eq (.Values.redis.provider | default "external") "internal" }}
{{- /*
When provider=internal the chart deploys its own Redis (templates/redis.yaml)
and owns the `pawtograder-redis` Secret that web + edge functions mount via
envFrom — the SAME secret name the `shared` provider's ExternalSecret produces,
so consumers stay identical across modes.

Password handling (auth.enabled): generate once, then PRESERVE across upgrades
by looking up the existing Secret. Server-side helm renders (Fleet/Argo, `helm
upgrade`) have cluster access so the lookup keeps REDIS_URL stable; a no-cluster
`helm template` regenerates it (dry-run only). An explicit
redis.internal.auth.password overrides the generator (avoid in GitOps).
*/ -}}
{{- $port := .Values.redis.internal.service.port | default 6379 -}}
{{- $auth := .Values.redis.internal.auth.enabled -}}
{{- $host := "pawtograder-redis" -}}
{{- $pw := "" -}}
{{- if $auth }}
{{-   $existing := lookup "v1" "Secret" .Release.Namespace "pawtograder-redis" -}}
{{-   if and $existing $existing.data (hasKey $existing.data "REDIS_PASSWORD") }}
{{-     $pw = index $existing.data "REDIS_PASSWORD" | b64dec -}}
{{-   else if .Values.redis.internal.auth.password }}
{{-     $pw = .Values.redis.internal.auth.password -}}
{{-   else }}
{{-     $pw = randAlphaNum 32 -}}
{{-   end }}
{{- end }}
{{- $url := ternary (printf "redis://:%s@%s:%v" $pw $host $port) (printf "redis://%s:%v" $host $port) (eq $auth true) -}}
apiVersion: v1
kind: Secret
metadata:
  name: pawtograder-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
type: Opaque
stringData:
  REDIS_URL: {{ $url | quote }}
  {{- if $auth }}
  REDIS_PASSWORD: {{ $pw | quote }}
  {{- end }}
{{- end }}
