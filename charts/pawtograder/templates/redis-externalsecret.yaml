{{- /*
ExternalSecret that materialises the shared-Redis REDIS_URL into a
pawtograder-redis Secret. The edge runtime's Deployment mounts that
Secret via envFrom (when redis.provider=shared), so the Redis.ts
factory picks the ioredis branch automatically — no app-code change
needed beyond the factory itself.

Provision the upstream Bao path once per cluster with
scripts/setup-openbao-redis-shared.sh. The shared Redis instance
itself is operator-deployed (see charts/pawtograder/examples/shared-redis/
for the bootstrap manifests) — this chart only consumes it.

For external Upstash deploys, set redis.provider=external (the default)
and this template renders nothing.
*/ -}}
{{- if eq (.Values.redis.provider | default "external") "shared" }}
{{- $storeName := .Values.redis.shared.storeName | default "openbao" -}}
{{- $storeKind := .Values.redis.shared.storeKind | default "ClusterSecretStore" -}}
{{- $baoPath   := .Values.redis.shared.path | default "apps/pawtograder/redis-shared" -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pawtograder-redis
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.redis.shared.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: pawtograder-redis
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ $baoPath }}
{{- end }}
