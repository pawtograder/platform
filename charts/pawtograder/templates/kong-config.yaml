{{- if .Values.kong.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "kong-config") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "kong") | nindent 4 }}
data:
  kong.yml: |
    _format_version: "2.1"
    _transform: true
    consumers:
      - username: anon
        keyauth_credentials:
          - key: $SUPABASE_ANON_KEY
      - username: service_role
        keyauth_credentials:
          - key: $SUPABASE_SERVICE_KEY
    acls:
      - consumer: anon
        group: anon
      - consumer: service_role
        group: admin
    services:
      - name: auth-v1-open
        url: http://{{ include "pawtograder.auth.host" . }}:{{ .Values.auth.service.port }}/verify
        routes:
          - name: auth-v1-open
            strip_path: true
            paths:
              - /auth/v1/verify
        plugins:
          - name: cors
      - name: auth-v1-open-callback
        url: http://{{ include "pawtograder.auth.host" . }}:{{ .Values.auth.service.port }}/callback
        routes:
          - name: auth-v1-open-callback
            strip_path: true
            paths:
              - /auth/v1/callback
        plugins:
          - name: cors
      - name: auth-v1-open-authorize
        url: http://{{ include "pawtograder.auth.host" . }}:{{ .Values.auth.service.port }}/authorize
        routes:
          - name: auth-v1-open-authorize
            strip_path: true
            paths:
              - /auth/v1/authorize
        plugins:
          - name: cors
      - name: auth-v1
        _comment: "GoTrue: /auth/v1/* -> http://auth:9999/*"
        url: http://{{ include "pawtograder.auth.host" . }}:{{ .Values.auth.service.port }}/
        routes:
          - name: auth-v1-all
            strip_path: true
            paths:
              - /auth/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
      - name: rest-v1
        _comment: "PostgREST: /rest/v1/* -> http://rest:3000/*"
        url: http://{{ include "pawtograder.rest.host" . }}:{{ .Values.rest.service.port }}/
        routes:
          - name: rest-v1-all
            strip_path: true
            paths:
              - /rest/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: true
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
      - name: realtime-v1
        _comment: "Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*"
        url: http://{{ include "pawtograder.realtime.host" . }}:{{ .Values.realtime.service.port }}/socket/
        routes:
          - name: realtime-v1-all
            strip_path: true
            paths:
              - /realtime/v1/
        plugins:
          - name: cors
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
                - anon
      - name: storage-v1
        _comment: "Storage: /storage/v1/* -> http://storage:5000/*"
        url: http://{{ include "pawtograder.storage.host" . }}:{{ .Values.storage.service.port }}/
        routes:
          - name: storage-v1-all
            strip_path: true
            paths:
              - /storage/v1/
        plugins:
          - name: cors
      - name: functions-v1
        _comment: "Functions: /functions/v1/* -> http://functions:9000/*"
        url: http://{{ include "pawtograder.edgeFunctions.host" . }}:{{ .Values.edgeFunctions.service.port }}/
        routes:
          - name: functions-v1-all
            strip_path: true
            paths:
              - /functions/v1/
        plugins:
          - name: cors
      - name: meta
        _comment: "pg-meta: /pg/* -> http://meta:8080/*"
        url: http://{{ include "pawtograder.meta.host" . }}:{{ .Values.meta.service.port }}/
        routes:
          - name: meta-all
            strip_path: true
            paths:
              - /pg/
        plugins:
          - name: key-auth
            config:
              hide_credentials: false
          - name: acl
            config:
              hide_groups_header: true
              allow:
                - admin
{{- end }}
