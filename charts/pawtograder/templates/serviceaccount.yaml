{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pawtograder.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# No pawtograder workload talks to the Kubernetes API — don't hand every
# pod an API token it never uses. The secrets-bootstrap hook Job runs under
# its own dedicated SA (see secrets-bootstrap-rbac.yaml) with the token
# mounted explicitly.
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken | default false }}
{{- with .Values.global.imagePullSecrets }}
imagePullSecrets:
  {{- toYaml . | nindent 2 }}
{{- end }}
{{- end }}
