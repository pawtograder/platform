{{- if .Values.storage.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.storage.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "storage") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.storage.service.port }}
      targetPort: http
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "storage") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pawtograder.storage.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "storage") | nindent 4 }}
spec:
  replicas: {{ .Values.storage.replicas }}
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "storage") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "storage") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: storage
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.storage.image) }}
          imagePullPolicy: {{ .Values.storage.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.storage.service.port }}
          env:
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: ANON_KEY
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: SERVICE_ROLE_KEY
            # AUTH_JWT_SECRET (HS256) used for the storage-api's own internal
            # token derivation; user session JWTs (ES256) are verified via
            # JWT_JWKS below.
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_SECRET
            - name: AUTH_JWT_ALGORITHM
              value: HS256
            - name: JWT_JWKS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_PUBLIC_JWKS
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_SECRET
            - name: POSTGREST_URL
              value: "http://{{ include "pawtograder.rest.host" . }}:{{ .Values.rest.service.port }}"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgres://supabase_storage_admin:$(POSTGRES_PASSWORD)@{{ include "pawtograder.postgres.host" . }}:{{ .Values.postgres.service.port }}/{{ .Values.postgres.database }}"
            - name: FILE_SIZE_LIMIT
              value: {{ .Values.storage.fileSizeLimit | quote }}
            - name: TENANT_ID
              value: stub
            - name: REGION
              value: {{ .Values.storage.s3.region | quote }}
            - name: GLOBAL_S3_BUCKET
              value: {{ .Values.storage.s3.bucket | quote }}
            - name: ENABLE_IMAGE_TRANSFORMATION
              value: "true"
            - name: IMGPROXY_URL
              value: "http://{{ include "pawtograder.imgproxy.host" . }}:{{ .Values.imgproxy.service.port }}"
            {{- if eq .Values.storage.backend "s3" }}
            - name: STORAGE_BACKEND
              value: s3
            - name: GLOBAL_S3_ENDPOINT
              value: {{ .Values.storage.s3.endpoint | quote }}
            - name: GLOBAL_S3_FORCE_PATH_STYLE
              value: {{ .Values.storage.s3.forcePathStyle | quote }}
            - name: GLOBAL_S3_PROTOCOL
              value: https
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.s3 }}
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.s3 }}
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_DEFAULT_REGION
              value: {{ .Values.storage.s3.region | quote }}
            {{- else }}
            - name: STORAGE_BACKEND
              value: file
            - name: FILE_STORAGE_BACKEND_PATH
              value: /var/lib/storage
            {{- end }}
          {{- if and (eq .Values.storage.backend "file") .Values.storage.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/storage
          {{- end }}
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.storage.resources | nindent 12 }}
      {{- if and (eq .Values.storage.backend "file") .Values.storage.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "pawtograder.storage.host" . }}
      {{- end }}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.storage)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.storage)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- if and (eq .Values.storage.backend "file") .Values.storage.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "pawtograder.storage.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "storage") | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.storage.persistence.accessMode }}
  {{- if .Values.storage.persistence.storageClass }}
  storageClassName: {{ .Values.storage.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.persistence.size }}
{{- end }}
{{- end }}
