{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.postgres.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - name: postgres
      port: {{ .Values.postgres.service.port }}
      targetPort: postgres
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pawtograder.postgres.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  serviceName: {{ include "pawtograder.postgres.host" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "postgres") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "postgres") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/postgres-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      {{- include "pawtograder.priorityClassName" (dict "ctx" . "component" .Values.postgres) | nindent 6 }}
      {{- /* fsGroup 999 + seccomp; see postgres.podSecurityContext in values */}}
      {{- include "pawtograder.podSecurityContext" (dict "ctx" . "component" .Values.postgres) | nindent 6 }}
      # Long grace so a busy postgres can checkpoint + flush WAL instead of
      # being SIGKILLed 30s into a drain and paying a recovery replay on the
      # next boot.
      terminationGracePeriodSeconds: {{ .Values.postgres.terminationGracePeriodSeconds | default 600 }}
      containers:
        - name: postgres
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.postgres.image) }}
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          {{- /* opted out by default (postgres.containerSecurityContext: {});
               renders only if an overlay sets one */}}
          {{- include "pawtograder.containerSecurityContext" (dict "ctx" . "component" .Values.postgres) | nindent 10 }}
          ports:
            - name: postgres
              containerPort: 5432
          args:
            - "-c"
            - "config_file=/etc/postgresql/postgresql.conf"
            - "-c"
            - "hba_file=/etc/postgresql/pg_hba.conf"
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database | quote }}
            # Bootstrap superuser MUST be supabase_admin: the supabase migration
            # `10000000000000_demote-postgres.sql` removes SUPERUSER from
            # `postgres`, which fails on Postgres ("bootstrap superuser must
            # have SUPERUSER attribute") if `postgres` is the initdb user.
            # The migrate.sh script later creates the `postgres` role itself.
            - name: POSTGRES_USER
              value: supabase_admin
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: POSTGRES_PASSWORD
            - name: PAWTOGRADER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: PAWTOGRADER_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_SECRET
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: config
              mountPath: /etc/postgresql/postgresql.conf
              subPath: postgresql.conf
            - name: config
              mountPath: /etc/postgresql/pg_hba.conf
              subPath: pg_hba.conf
            - name: config
              mountPath: /etc/postgresql/pgsodium_getkey.sh
              subPath: pgsodium_getkey.sh
            - name: config
              mountPath: /docker-entrypoint-initdb.d/00-supabase-admin.sh
              subPath: 00-supabase-admin.sh
            - name: config
              mountPath: /docker-entrypoint-initdb.d/zy-app-role.sh
              subPath: init-app-role.sh
            - name: config
              mountPath: /docker-entrypoint-initdb.d/zz-supabase-passwords.sh
              subPath: zz-supabase-passwords.sh
            - name: pgsodium
              mountPath: /var/run/secrets/pgsodium
              readOnly: true
          readinessProbe:
            exec:
              command:
                - pg_isready
                # Probe the bootstrap superuser, not `postgres`. The
                # `postgres` role is created later by migrate.sh; on first
                # boot it doesn't exist yet, so probing it would keep the
                # pod NotReady (or trip liveness) until migrations finish.
                - -U
                - supabase_admin
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command:
                - pg_isready
                # Probe the bootstrap superuser, not `postgres`. The
                # `postgres` role is created later by migrate.sh; on first
                # boot it doesn't exist yet, so probing it would keep the
                # pod NotReady (or trip liveness) until migrations finish.
                - -U
                - supabase_admin
                - -d
                - {{ .Values.postgres.database }}
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
        {{- if .Values.monitoring.enabled }}
        # postgres_exporter sidecar — connects via TCP to localhost (the
        # postgres container in the same pod). pg_stat_statements is
        # available because supabase/postgres ships it preinstalled;
        # see the queries.yaml ConfigMap for the custom collectors that
        # surface supabase-specific tables (auth.users, storage.buckets,
        # realtime.messages partitions, gradebook recalc backlog, etc.).
        - name: postgres-exporter
          image: {{ .Values.monitoring.postgresExporter.image.repository }}:{{ .Values.monitoring.postgresExporter.image.tag }}
          imagePullPolicy: {{ .Values.monitoring.postgresExporter.image.pullPolicy }}
          {{- /* the exporter is a static nonroot binary — global default applies */}}
          {{- include "pawtograder.containerSecurityContext" (dict "ctx" . "component" .Values.monitoring.postgresExporter) | nindent 10 }}
          ports:
            - name: metrics
              containerPort: 9187
          env:
            - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
              value: "true"
            - name: PG_EXPORTER_EXTEND_QUERY_PATH
              value: /etc/postgres-exporter/queries.yaml
            - name: DATA_SOURCE_URI
              value: "127.0.0.1:5432/{{ .Values.postgres.database }}?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: supabase_admin
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-exporter-queries
              mountPath: /etc/postgres-exporter
              readOnly: true
          resources:
            {{- toYaml .Values.monitoring.postgresExporter.resources | nindent 12 }}
        {{- end }}
      volumes:
        {{- if not .Values.postgres.persistence.enabled }}
        # No PVC requested — back the data dir with an emptyDir so the pod
        # can still start. NOTE: emptyDir is ephemeral; the database is
        # wiped whenever the pod is rescheduled. Only useful for previews
        # / disposable test environments. Persistent deployments must set
        # postgres.persistence.enabled=true.
        - name: data
          emptyDir: {}
        {{- end }}
        - name: config
          configMap:
            name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "postgres-config") }}
            defaultMode: 0644
            items:
              - key: postgresql.conf
                path: postgresql.conf
              - key: pg_hba.conf
                path: pg_hba.conf
              - key: init-app-role.sh
                path: init-app-role.sh
                mode: 0755
              - key: 00-supabase-admin.sh
                path: 00-supabase-admin.sh
                mode: 0755
              - key: zz-supabase-passwords.sh
                path: zz-supabase-passwords.sh
                mode: 0755
              - key: pgsodium_getkey.sh
                path: pgsodium_getkey.sh
                mode: 0755
        - name: pgsodium
          secret:
            secretName: {{ .Values.secrets.names.jwt }}
            defaultMode: 0444
            items:
              - key: PGSODIUM_ROOT_KEY
                path: PGSODIUM_ROOT_KEY
                mode: 0444
        {{- if .Values.monitoring.enabled }}
        - name: postgres-exporter-queries
          configMap:
            name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "postgres-exporter") }}
            defaultMode: 0444
        {{- end }}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.postgres)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.postgres)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.affinity" (dict "ctx" . "component" .Values.postgres)) }}
      affinity:
        {{- . | nindent 8 }}
      {{- end }}
  {{- if .Values.postgres.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.postgres.persistence.accessMode }}
        {{- if .Values.postgres.persistence.storageClass }}
        storageClassName: {{ .Values.postgres.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.postgres.persistence.size }}
  {{- end }}
{{- end }}
