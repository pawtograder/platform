{{- if .Values.kong.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.kong.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "kong") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.kong.service.port }}
      targetPort: http
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "kong") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pawtograder.kong.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "kong") | nindent 4 }}
spec:
  replicas: {{ .Values.kong.replicas }}
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "kong") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "kong") | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/kong-config.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: kong
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.kong.image) }}
          imagePullPolicy: {{ .Values.kong.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.kong.service.port }}
          env:
            - name: KONG_DATABASE
              value: "off"
            # Default is "auto" which reads host CPU count — on a 64-core
            # node that's 64 nginx workers, each ~150MiB. Pin to a small
            # fixed count.
            - name: KONG_NGINX_WORKER_PROCESSES
              value: "2"
            - name: KONG_DECLARATIVE_CONFIG
              value: /var/lib/kong/kong.yml
            - name: KONG_DNS_ORDER
              value: "LAST,A,CNAME"
            - name: KONG_PLUGINS
              value: "request-transformer,cors,key-auth,acl,basic-auth"
            - name: KONG_PROXY_LISTEN
              value: "0.0.0.0:{{ .Values.kong.service.port }}"
            - name: KONG_ADMIN_LISTEN
              value: "off"
            - name: KONG_NGINX_PROXY_PROXY_BUFFER_SIZE
              value: "160k"
            - name: KONG_NGINX_PROXY_PROXY_BUFFERS
              value: "64 160k"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: ANON_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: SERVICE_ROLE_KEY
          volumeMounts:
            - name: rendered
              mountPath: /var/lib/kong
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.kong.resources | nindent 12 }}
      # Kong (oss/ee) doesn't ship envsubst, and KONG_DECLARATIVE_CONFIG
      # interprets $VARS literally. Init container substitutes anon/service
      # keys into kong.yml at start; rendered file lives in an emptyDir.
      initContainers:
        - name: render-config
          image: alpine:3.20
          command:
            - sh
            - -c
            - |
              set -e
              apk add --no-cache gettext >/dev/null
              envsubst < /template/kong.yml > /rendered/kong.yml
              echo "[render] /rendered/kong.yml ready ($(wc -l </rendered/kong.yml) lines)"
          env:
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: ANON_KEY
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: SERVICE_ROLE_KEY
          volumeMounts:
            - name: template
              mountPath: /template
              readOnly: true
            - name: rendered
              mountPath: /rendered
      volumes:
        - name: template
          configMap:
            name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "kong-config") }}
        - name: rendered
          emptyDir: {}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.kong)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.kong)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
