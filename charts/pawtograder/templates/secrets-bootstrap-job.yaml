{{- if .Values.secrets.autogenerate -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: bootstrap
          image: node:22-alpine
          command: ["node", "/script/bootstrap.mjs"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          volumeMounts:
            - name: script
              mountPath: /script
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
            defaultMode: 0444
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.postgres)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.postgres)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
