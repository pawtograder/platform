# ServiceMonitor: GoTrue (auth). /metrics on the http port; requires
# GOTRUE_METRICS_ENABLED=true, set in auth.yaml.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "auth") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "auth") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "auth") | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
---
# ServiceMonitor: kong (Prometheus plugin via admin port :8001).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "kong") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "kong") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "kong") | nindent 6 }}
  endpoints:
    - port: admin-metrics
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
---
# ServiceMonitor: realtime. /metrics gated by an HS256 JWT signed with
# API_JWT_SECRET (= JWT_SECRET in this chart). Pre-minted bearer lives in
# pawtograder-jwt; Prometheus injects it as Authorization: Bearer <token>.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "realtime") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "realtime") | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      authorization:
        type: Bearer
        credentials:
          name: {{ .Values.secrets.names.jwt }}
          key: REALTIME_METRICS_BEARER
{{- if .Values.supavisor.enabled }}
---
# ServiceMonitor: supavisor. /metrics gated by an HS256 JWT signed with
# SUPAVISOR_METRICS_JWT_SECRET (distinct from API_JWT_SECRET).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "supavisor") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "supavisor") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "supavisor") | nindent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      authorization:
        type: Bearer
        credentials:
          name: {{ .Values.secrets.names.jwt }}
          key: SUPAVISOR_METRICS_BEARER
{{- end }}
---
# ServiceMonitor: web (Next.js /api/metrics). Static bearer; the app does
# a constant-time string compare. See app/api/metrics/route.ts.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "web") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "web") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "web") | nindent 6 }}
  endpoints:
    - port: http
      path: /api/metrics
      interval: {{ .Values.monitoring.scrapeInterval }}
      scrapeTimeout: {{ .Values.monitoring.scrapeTimeout }}
      authorization:
        type: Bearer
        credentials:
          name: {{ .Values.secrets.names.jwt }}
          key: METRICS_SCRAPE_TOKEN
{{- end }}
