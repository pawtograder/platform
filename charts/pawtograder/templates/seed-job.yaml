{{- if and .Values.postgres.enabled .Values.seed.enabled }}
# Seed Job: applies supabase/seed.sql to create the Demo Class (and
# canned auth.users / assignments / submissions). Runs as a
# post-install,post-upgrade Helm hook.
#
# IMPORTANT: this hook fires after helm's --wait phase, which only
# blocks on Deployments/StatefulSets — NOT on the migrations Job (a
# regular install resource). Callers MUST pass --wait-for-jobs to
# `helm install/upgrade` so migrations completes before this fires.
# Otherwise seed.sh races migrations against an empty schema.
# seed.sh defends against this by hard-failing if public.classes is
# missing, but the right thing is to wait for jobs.
#
# Idempotent — seed.sh skips if the demo class exists.
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pawtograder.componentName" (dict "ctx" . "component" "seed") }}-{{ .Release.Revision }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "seed") | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "seed") | nindent 8 }}
    spec:
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      restartPolicy: OnFailure
      containers:
        - name: seed
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.migrations.image) }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          command: ["/usr/local/bin/seed"]
          env:
            - name: PGHOST
              value: {{ include "pawtograder.postgres.host" . }}
            - name: PGPORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: PGDATABASE
              value: {{ .Values.postgres.database | quote }}
            # supabase_admin is needed because seed.sql writes into
            # auth.users (owned by supabase_auth_admin) and other schemas
            # the demoted `postgres` role can't reach.
            - name: PGUSER
              value: supabase_admin
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: POSTGRES_PASSWORD
            {{- if .Values.seed.externalSecret.enabled }}
            # Shared-preview seed user password — synced from OpenBao by
            # templates/preview-shared-externalsecret.yaml. seed.sh
            # rewrites every demo user's encrypted_password to crypt()
            # of this value so reviewers can password-auth into the
            # preview.
            - name: SEED_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pawtograder-preview-shared
                  key: seed_user_password
            {{- end }}
          resources:
            {{- toYaml .Values.seed.resources | nindent 12 }}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.postgres)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.postgres)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
