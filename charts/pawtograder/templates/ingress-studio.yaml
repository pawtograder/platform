{{- if and .Values.ingress.enabled .Values.studio.ingressEnabled -}}
{{- /*
Studio's Ingress is split out from the main Ingress because nginx-ingress
auth-* annotations apply to the whole resource, not per-host. This lets us
gate Studio behind basic-auth while leaving the web/api hosts unprotected.
*/ -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "pawtograder.fullname" . }}-studio
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "studio") | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if .Values.studio.basicAuth.enabled }}
    nginx.ingress.kubernetes.io/auth-type: basic
    nginx.ingress.kubernetes.io/auth-secret: {{ .Values.studio.basicAuth.secretName | quote }}
    nginx.ingress.kubernetes.io/auth-realm: {{ .Values.studio.basicAuth.realm | quote }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - "studio.{{ .Values.global.hostname }}"
      secretName: {{ .Values.studio.basicAuth.tlsSecretName | default .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: "studio.{{ .Values.global.hostname }}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "pawtograder.studio.host" . }}
                port:
                  number: {{ .Values.studio.service.port }}
{{- end }}
