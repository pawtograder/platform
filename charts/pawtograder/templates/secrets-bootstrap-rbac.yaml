{{- if .Values.secrets.autogenerate -}}
{{- /*
RBAC for the secrets-bootstrap Job. ServiceAccount + Role scoped to this
namespace, allowing get/create on Secrets only. Lifecycle is tied to the
Helm hook so the SA gets cleaned up if the bootstrap is later disabled.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
    namespace: {{ .Release.Namespace }}
{{- end }}
