{{- if .Values.secrets.autogenerate -}}
{{- /*
RBAC for the secrets-bootstrap Job. ServiceAccount + Role scoped to this
namespace, allowing get/create on Secrets only. Lifecycle is tied to the
Helm hook so the SA gets cleaned up if the bootstrap is later disabled.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
rules:
  # `get` is name-restricted to exactly the Secrets the bootstrap script
  # idempotency-checks — not every Secret in the namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ .Values.secrets.names.jwt | quote }}
      - {{ .Values.secrets.names.postgres | quote }}
      - {{ .Values.secrets.names.edgeFunctions | quote }}
      - "pawtograder-e2e"
    verbs: ["get"]
  # `create` cannot be restricted by resourceName (the API server authorizes
  # create before the object name exists), so it stays namespace-scoped.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
subjects:
  - kind: ServiceAccount
    name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
    namespace: {{ .Release.Namespace }}
{{- end }}
