{{- if .Values.realtime.enabled }}
# Headless Service for BEAM clustering — pods discover peers via DNS A records.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.realtime.headless" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: epmd
      port: 4369
      targetPort: epmd
    - name: erlang
      port: 9000
      targetPort: erlang
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
---
# Client-facing Service.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.realtime.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.realtime.service.port }}
      targetPort: http
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pawtograder.realtime.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "realtime") | nindent 4 }}
spec:
  serviceName: {{ include "pawtograder.realtime.headless" . }}
  replicas: {{ .Values.realtime.replicas }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "realtime") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "realtime") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: realtime
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.realtime.image) }}
          imagePullPolicy: {{ .Values.realtime.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.realtime.service.port }}
            - name: epmd
              containerPort: 4369
            - name: erlang
              containerPort: 9000
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: PORT
              value: {{ .Values.realtime.service.port | quote }}
            - name: DB_HOST
              value: {{ include "pawtograder.postgres.host" . }}
            - name: DB_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: DB_NAME
              value: {{ .Values.postgres.database | quote }}
            - name: DB_USER
              value: supabase_admin
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.postgres }}
                  key: POSTGRES_PASSWORD
            # The supabase/postgres image's init-scripts create the
            # `realtime` schema (no underscore). Realtime puts its
            # ecto-managed tables there. The community-docker convention is
            # `_realtime` but THIS image uses unprefixed `realtime`.
            - name: DB_AFTER_CONNECT_QUERY
              value: "SET search_path TO realtime"
            # AES-128 — exactly 16 bytes. Stored as REALTIME_ENC_KEY in the
            # JWT secret bundle; emitted by scripts/GenerateJwtKeys.ts.
            - name: DB_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: REALTIME_ENC_KEY
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_SECRET
            # API_JWT_SECRET secures Realtime's admin API and seeds the
            # default tenant's HS256 fallback. User session JWTs (ES256) are
            # verified against API_JWT_JWKS below.
            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_SECRET
            # API_JWT_JWKS = EC-only (no oct key). Two paths in realtime's
            # jwt_verification.ex:
            #   ES256 + kid → finds EC by kid → verifies user session JWTs.
            #   HS256 + kid → no oct match → falls back to API_JWT_SECRET
            #                 (Joken accepts a binary string for HS but
            #                 raises on a JWK map; that's why we exclude
            #                 the oct key from this JWKS).
            - name: API_JWT_JWKS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.names.jwt }}
                  key: JWT_REALTIME_JWKS
            - name: APP_NAME
              value: realtime
            - name: FLY_ALLOC_ID
              value: $(POD_NAME)
            - name: FLY_APP_NAME
              value: realtime
            - name: ERL_AFLAGS
              value: "-proto_dist inet_tcp"
            # Clustering — discover peers via the headless Service's DNS.
            - name: CLUSTER_POSTGRES
              value: "true"
            - name: DNS_NODES
              value: "{{ include "pawtograder.realtime.headless" . }}.{{ .Release.Namespace }}.svc.cluster.local"
            - name: RLIMIT_NOFILE
              value: "10000"
            - name: REALTIME_IP_VERSION
              value: IPv4
            - name: MAX_HEADER_LENGTH
              value: {{ .Values.realtime.maxHeaderLength | quote }}
            - name: SEED_SELF_HOST
              value: "true"
            # Realtime parses the Host header to find the tenant by
            # external_id. Kong forwards with Host = the upstream service
            # name (no dots → realtime treats the whole string as the
            # external_id). Set the seeded tenant name to match.
            - name: SELF_HOST_TENANT_NAME
              value: {{ include "pawtograder.realtime.host" . }}
          # Realtime applies per-tenant DB migrations LAZILY — they run when
          # a client first connects to the tenant. realtime.messages and
          # realtime.subscription (referenced by pawtograder migrations) are
          # created by these tenant migrations. Without intervention, fresh
          # installs can have pawtograder migrations fire against a schema
          # where realtime.messages doesn't exist yet.
          #
          # postStart waits for the local node to accept RPC, then triggers
          # Realtime.Tenants.Migrations.run_migrations for every tenant.
          # The migration framework records applied versions, so this is
          # idempotent across pod restarts and across the 3 statefulset
          # replicas. Failures are tolerated (|| true) so a transient hiccup
          # doesn't kill the pod — the migrations Job's wait probe for
          # realtime.messages is the source of truth for "did this work."
          lifecycle:
            postStart:
              exec:
                command:
                  - sh
                  - -c
                  - |
                    for i in $(seq 1 60); do
                      if /app/bin/realtime rpc 'IO.puts(:ok)' 2>/dev/null | grep -q '^ok$'; then
                        break
                      fi
                      sleep 2
                    done
                    # Use get_tenant_by_external_id (not Repo.all directly) so
                    # the Tenant struct comes back with its :extensions
                    # association preloaded — run_migrations/1 pattern-matches
                    # on extensions and crashes if it's NotLoaded.
                    /app/bin/realtime rpc \
                      'for %{external_id: eid} <- Realtime.Repo.all(Realtime.Api.Tenant), t = Realtime.Api.get_tenant_by_external_id(eid), do: Realtime.Tenants.Migrations.run_migrations(t)' \
                      >/dev/null 2>&1 || true
          # Realtime v2.34 has no public unauthenticated health endpoint
          # (/healthz returns 404; /api/tenants/<id>/health needs a JWT).
          # TCP probe just confirms the listener is up — good enough for
          # liveness/readiness in a single-tenant self-hosted setup.
          readinessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            {{- toYaml .Values.realtime.resources | nindent 12 }}
      {{- /*
      Per-component / global affinity (if set) wins over the
      spreadAcrossNodes default — the user opted into custom placement
      explicitly. Otherwise emit the default soft podAntiAffinity for
      `spreadAcrossNodes`.
      */ -}}
      {{- $userAffinity := include "pawtograder.affinity" (dict "ctx" . "component" .Values.realtime) -}}
      {{- if $userAffinity }}
      affinity:
        {{- $userAffinity | nindent 8 }}
      {{- else if .Values.realtime.spreadAcrossNodes }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "realtime") | nindent 20 }}
      {{- end }}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.realtime)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.realtime)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
