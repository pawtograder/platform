{{- if .Values.secrets.autogenerate -}}
{{- /*
ConfigMap holding the secret-generation script. Pure node + the cluster's
mounted serviceaccount token; talks to the k8s API directly via node:https
so we don't need kubectl in the image.

The script is idempotent: GET each Secret first, skip if it exists, only
POST when missing. So `helm upgrade` is a no-op once the chart is
installed; only the very first install actually generates.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  bootstrap.mjs: |
    import { createHmac, generateKeyPairSync, randomBytes } from "node:crypto";
    import { readFileSync } from "node:fs";
    import { request } from "node:https";

    const SA_DIR = "/var/run/secrets/kubernetes.io/serviceaccount";
    const NS    = readFileSync(`${SA_DIR}/namespace`, "utf-8").trim();
    const TOKEN = readFileSync(`${SA_DIR}/token`,     "utf-8").trim();
    const CA    = readFileSync(`${SA_DIR}/ca.crt`);
    const HOST  = process.env.KUBERNETES_SERVICE_HOST || "kubernetes.default.svc";
    const PORT  = process.env.KUBERNETES_SERVICE_PORT || "443";

    const b64url = (b) =>
      Buffer.from(b).toString("base64").replaceAll("=", "").replaceAll("+", "-").replaceAll("/", "_");

    function signHS256(secret, payload, kid) {
      const header = { alg: "HS256", typ: "JWT", kid };
      const h = b64url(JSON.stringify(header));
      const p = b64url(JSON.stringify(payload));
      const sig = b64url(createHmac("sha256", secret).update(`${h}.${p}`).digest());
      return `${h}.${p}.${sig}`;
    }

    function api(method, path, body) {
      return new Promise((resolve, reject) => {
        const req = request(
          {
            hostname: HOST,
            port: PORT,
            path,
            method,
            ca: CA,
            headers: {
              Authorization: `Bearer ${TOKEN}`,
              "Content-Type": "application/json",
              Accept: "application/json",
            },
          },
          (res) => {
            let data = "";
            res.on("data", (c) => (data += c));
            res.on("end", () => resolve({ status: res.statusCode, body: data }));
          }
        );
        req.on("error", reject);
        if (body) req.write(JSON.stringify(body));
        req.end();
      });
    }

    async function ensureSecret(name, stringData) {
      const get = await api("GET", `/api/v1/namespaces/${NS}/secrets/${name}`);
      if (get.status === 200) {
        console.log(`secret ${name}: exists, skip`);
        return;
      }
      const data = Object.fromEntries(
        Object.entries(stringData).map(([k, v]) => [k, Buffer.from(v).toString("base64")])
      );
      const body = {
        apiVersion: "v1",
        kind: "Secret",
        metadata: {
          name,
          namespace: NS,
          labels: { "app.kubernetes.io/managed-by": "pawtograder-secrets-bootstrap" },
        },
        type: "Opaque",
        data,
      };
      const post = await api("POST", `/api/v1/namespaces/${NS}/secrets`, body);
      if (post.status >= 400) throw new Error(`create ${name}: ${post.status} ${post.body}`);
      console.log(`secret ${name}: created`);
    }

    // --- generate JWT material -----------------------------------------------
    const SESSION_KID = "pawtograder-session-v1";
    const APIKEYS_KID = "pawtograder-apikeys-v1";
    const TEN_YEARS = 60 * 60 * 24 * 365 * 10;

    const { privateKey, publicKey } = generateKeyPairSync("ec", { namedCurve: "P-256" });
    const privJwk = privateKey.export({ format: "jwk" });
    const pubJwk = publicKey.export({ format: "jwk" });
    const ecPrivate = { ...privJwk, kid: SESSION_KID, alg: "ES256", use: "sig", key_ops: ["sign", "verify"] };
    const ecPublic  = { ...pubJwk,  kid: SESSION_KID, alg: "ES256", use: "sig", key_ops: ["verify"] };

    const hsSecret = randomBytes(48).toString("base64");
    const octPublic = {
      kty: "oct", k: b64url(hsSecret),
      kid: APIKEYS_KID, alg: "HS256", use: "sig", key_ops: ["verify"],
    };

    const privateJwks = JSON.stringify([ecPrivate, octPublic]);
    const publicJwks  = JSON.stringify({ keys: [ecPublic, octPublic] });
    // EC-only JWKS for realtime; see comment in GenerateJwtKeys.ts.
    const realtimeJwks = JSON.stringify({ keys: [ecPublic] });
    const now = Math.floor(Date.now() / 1000);
    const exp = now + TEN_YEARS;
    const anonKey        = signHS256(hsSecret, { iss: "supabase", ref: "pawtograder", role: "anon",         iat: now, exp }, APIKEYS_KID);
    const serviceRoleKey = signHS256(hsSecret, { iss: "supabase", ref: "pawtograder", role: "service_role", iat: now, exp }, APIKEYS_KID);

    const realtimeEncKey  = randomBytes(16).toString("base64").slice(0, 16);
    const pgMetaCryptoKey = randomBytes(32).toString("base64");
    const pgsodiumRootKey = randomBytes(32).toString("hex");

    const pgPass  = randomBytes(24).toString("base64").replace(/[/+=]/g, "").slice(0, 32);
    const appPass = randomBytes(24).toString("base64").replace(/[/+=]/g, "").slice(0, 32);

    const e2eSecret  = randomBytes(32).toString("hex");
    const edgeSecret = randomBytes(32).toString("hex");

    // --- write -----------------------------------------------------------------
    await ensureSecret("{{ .Values.secrets.names.jwt }}", {
      JWT_SECRET: hsSecret,
      ANON_KEY: anonKey,
      SERVICE_ROLE_KEY: serviceRoleKey,
      JWT_PRIVATE_JWKS: privateJwks,
      JWT_PUBLIC_JWKS: publicJwks,
      JWT_REALTIME_JWKS: realtimeJwks,
      REALTIME_ENC_KEY: realtimeEncKey,
      PG_META_CRYPTO_KEY: pgMetaCryptoKey,
      PGSODIUM_ROOT_KEY: pgsodiumRootKey,
    });

    await ensureSecret("{{ .Values.secrets.names.postgres }}", {
      POSTGRES_PASSWORD: pgPass,
      PAWTOGRADER_PASSWORD: appPass,
    });

    await ensureSecret("pawtograder-e2e", {
      END_TO_END_SECRET: e2eSecret,
      EDGE_FUNCTION_SECRET: edgeSecret,
    });

    console.log("bootstrap done");
{{- end }}
