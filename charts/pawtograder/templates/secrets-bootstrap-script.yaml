{{- if .Values.secrets.autogenerate -}}
{{- /*
ConfigMap holding the secret-generation script. Pure node + the cluster's
mounted serviceaccount token; talks to the k8s API directly via node:https
so we don't need kubectl in the image.

The script is idempotent: GET each Secret first, skip if it exists, only
POST when missing. So `helm upgrade` is a no-op once the chart is
installed; only the very first install actually generates.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "pawtograder.fullname" . }}-secrets-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "secrets-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-9"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  bootstrap.mjs: |
    import { createHmac, generateKeyPairSync, randomBytes } from "node:crypto";
    import { readFileSync } from "node:fs";
    import { request } from "node:https";

    const SA_DIR = "/var/run/secrets/kubernetes.io/serviceaccount";
    const NS    = readFileSync(`${SA_DIR}/namespace`, "utf-8").trim();
    const TOKEN = readFileSync(`${SA_DIR}/token`,     "utf-8").trim();
    const CA    = readFileSync(`${SA_DIR}/ca.crt`);
    const HOST  = process.env.KUBERNETES_SERVICE_HOST || "kubernetes.default.svc";
    const PORT  = process.env.KUBERNETES_SERVICE_PORT || "443";

    const b64url = (b) =>
      Buffer.from(b).toString("base64").replaceAll("=", "").replaceAll("+", "-").replaceAll("/", "_");

    function signHS256(secret, payload, kid) {
      const header = { alg: "HS256", typ: "JWT", kid };
      const h = b64url(JSON.stringify(header));
      const p = b64url(JSON.stringify(payload));
      const sig = b64url(createHmac("sha256", secret).update(`${h}.${p}`).digest());
      return `${h}.${p}.${sig}`;
    }

    function api(method, path, body) {
      return new Promise((resolve, reject) => {
        const req = request(
          {
            hostname: HOST,
            port: PORT,
            path,
            method,
            ca: CA,
            headers: {
              Authorization: `Bearer ${TOKEN}`,
              "Content-Type": "application/json",
              Accept: "application/json",
            },
          },
          (res) => {
            let data = "";
            res.on("data", (c) => (data += c));
            res.on("end", () => resolve({ status: res.statusCode, body: data }));
          }
        );
        req.on("error", reject);
        if (body) req.write(JSON.stringify(body));
        req.end();
      });
    }

    async function ensureSecret(name, stringData) {
      const get = await api("GET", `/api/v1/namespaces/${NS}/secrets/${name}`);
      if (get.status === 200) {
        console.log(`secret ${name}: exists, skip`);
        return;
      }
      const data = Object.fromEntries(
        Object.entries(stringData).map(([k, v]) => [k, Buffer.from(v).toString("base64")])
      );
      const body = {
        apiVersion: "v1",
        kind: "Secret",
        metadata: {
          name,
          namespace: NS,
          labels: { "app.kubernetes.io/managed-by": "pawtograder-secrets-bootstrap" },
        },
        type: "Opaque",
        data,
      };
      const post = await api("POST", `/api/v1/namespaces/${NS}/secrets`, body);
      if (post.status >= 400) throw new Error(`create ${name}: ${post.status} ${post.body}`);
      console.log(`secret ${name}: created`);
    }

    // --- generate JWT material -----------------------------------------------
    const SESSION_KID = "pawtograder-session-v1";
    const APIKEYS_KID = "pawtograder-apikeys-v1";
    const TEN_YEARS = 60 * 60 * 24 * 365 * 10;

    const { privateKey, publicKey } = generateKeyPairSync("ec", { namedCurve: "P-256" });
    const privJwk = privateKey.export({ format: "jwk" });
    const pubJwk = publicKey.export({ format: "jwk" });
    const ecPrivate = { ...privJwk, kid: SESSION_KID, alg: "ES256", use: "sig", key_ops: ["sign", "verify"] };
    const ecPublic  = { ...pubJwk,  kid: SESSION_KID, alg: "ES256", use: "sig", key_ops: ["verify"] };

    const hsSecret = randomBytes(48).toString("base64");
    const octPublic = {
      kty: "oct", k: b64url(hsSecret),
      kid: APIKEYS_KID, alg: "HS256", use: "sig", key_ops: ["verify"],
    };

    const privateJwks = JSON.stringify([ecPrivate, octPublic]);
    const publicJwks  = JSON.stringify({ keys: [ecPublic, octPublic] });
    // EC-only JWKS for realtime; see comment in GenerateJwtKeys.ts.
    const realtimeJwks = JSON.stringify({ keys: [ecPublic] });
    const now = Math.floor(Date.now() / 1000);
    const exp = now + TEN_YEARS;
    const anonKey        = signHS256(hsSecret, { iss: "supabase", ref: "pawtograder", role: "anon",         iat: now, exp }, APIKEYS_KID);
    const serviceRoleKey = signHS256(hsSecret, { iss: "supabase", ref: "pawtograder", role: "service_role", iat: now, exp }, APIKEYS_KID);
    // Long-lived metrics scrape tokens. See scripts/GenerateJwtKeys.ts
    // for the rationale; these are referenced by the ServiceMonitor CRs
    // via bearerTokenSecret when monitoring.enabled=true.
    const realtimeMetricsBearer = signHS256(hsSecret, { iss: "supabase", ref: "pawtograder", role: "realtime_admin", iat: now, exp }, APIKEYS_KID);

    const realtimeEncKey  = randomBytes(16).toString("base64").slice(0, 16);
    const pgMetaCryptoKey = randomBytes(32).toString("base64");
    const pgsodiumRootKey = randomBytes(32).toString("hex");

    // Supavisor: each env var needs its own distinct secret. See
    // templates/supavisor.yaml for length/role requirements per key.
    const supavisorSecretKeyBase    = randomBytes(48).toString("base64"); // ~64 chars
    const supavisorVaultEncKey      = randomBytes(24).toString("base64").slice(0, 32); // exactly 32 bytes
    const supavisorApiJwtSecret     = randomBytes(48).toString("base64");
    const supavisorMetricsJwtSecret = randomBytes(48).toString("base64");
    const supavisorMetricsBearer    = signHS256(supavisorMetricsJwtSecret, { iss: "supavisor", role: "metrics", iat: now, exp }, "pawtograder-supavisor-metrics");
    // Static opaque token gating the web app's /api/metrics endpoint.
    // 32 random bytes hex = 64 chars; constant-time compared server-side.
    const metricsScrapeToken = randomBytes(32).toString("hex");

    const pgPass  = randomBytes(24).toString("base64").replace(/[/+=]/g, "").slice(0, 32);
    const appPass = randomBytes(24).toString("base64").replace(/[/+=]/g, "").slice(0, 32);

    const e2eSecret  = randomBytes(32).toString("hex");
    const edgeSecret = randomBytes(32).toString("hex");

    // --- write -----------------------------------------------------------------
    await ensureSecret("{{ .Values.secrets.names.jwt }}", {
      JWT_SECRET: hsSecret,
      ANON_KEY: anonKey,
      SERVICE_ROLE_KEY: serviceRoleKey,
      JWT_PRIVATE_JWKS: privateJwks,
      JWT_PUBLIC_JWKS: publicJwks,
      JWT_REALTIME_JWKS: realtimeJwks,
      REALTIME_ENC_KEY: realtimeEncKey,
      PG_META_CRYPTO_KEY: pgMetaCryptoKey,
      PGSODIUM_ROOT_KEY: pgsodiumRootKey,
      SUPAVISOR_SECRET_KEY_BASE: supavisorSecretKeyBase,
      SUPAVISOR_VAULT_ENC_KEY: supavisorVaultEncKey,
      SUPAVISOR_API_JWT_SECRET: supavisorApiJwtSecret,
      SUPAVISOR_METRICS_JWT_SECRET: supavisorMetricsJwtSecret,
      REALTIME_METRICS_BEARER: realtimeMetricsBearer,
      SUPAVISOR_METRICS_BEARER: supavisorMetricsBearer,
      METRICS_SCRAPE_TOKEN: metricsScrapeToken,
    });

    await ensureSecret("{{ .Values.secrets.names.postgres }}", {
      POSTGRES_PASSWORD: pgPass,
      PAWTOGRADER_PASSWORD: appPass,
    });

    await ensureSecret("pawtograder-e2e", {
      END_TO_END_SECRET: e2eSecret,
      EDGE_FUNCTION_SECRET: edgeSecret,
    });

    {{- if .Values.edgeFunctions.e2e.enabled }}
    // Stub edge-functions secret for E2E mode. The edge runtime imports
    // _shared/GitHubWrapper.ts at startup, which constructs an Octokit
    // App({ appId, privateKey }) at module top-level — even when
    // E2E_MOCK_GITHUB=true. With privateKey missing, that constructor
    // throws synchronously and *every* function in the runtime fails
    // with InvalidWorkerResponse, including the test-bypass paths the
    // E2E suite uses. Generate a throwaway RSA key so the module loads;
    // the actual GitHub calls are mocked downstream.
    //
    // The stub only lands when edgeFunctions.e2e.enabled=true (the
    // preview / test profile). Real prod installs leave pawtograder-
    // edge-functions for the operator to provision with real GitHub
    // credentials via ESO / sealed-secrets / kubectl create.
    const { generateKeyPairSync: genRsa } = await import("node:crypto");
    const { privateKey: stubPriv } = genRsa("rsa", {
      modulusLength: 2048,
      privateKeyEncoding: { type: "pkcs8", format: "pem" },
      publicKeyEncoding:  { type: "spki",  format: "pem" }
    });
    await ensureSecret("{{ .Values.secrets.names.edgeFunctions }}", {
      // PEM string; GitHubWrapper.ts feeds this to @octokit/auth-app.
      GITHUB_PRIVATE_KEY_STRING: stubPriv,
      // App-ID must be a parseable integer or createAppAuth balks.
      GITHUB_APP_ID: "1",
      // Other GitHub fields — present but harmless. Mock-mode never
      // actually hits the GitHub API.
      GITHUB_OAUTH_CLIENT_ID: "stub",
      GITHUB_OAUTH_CLIENT_SECRET: "stub",
      GITHUB_WEBHOOK_SECRET: "stub-webhook-secret",
    });
    {{- end }}

    // Intentionally NOT auto-generated:
    //   pawtograder-s3 — carries the MinIO credentials that storage-api
    //     and the mc backup client use to talk to the storage backend
    //     (preview CI populates this from MINIO_PREVIEW_*; prod has its
    //     own MinIO). A "REPLACE_ME" placeholder would let pods start
    //     while storage was broken at request time, and ensureSecret()
    //     never re-runs once a Secret exists, so the bad value would
    //     persist across upgrades. If storage.backend=s3, operators
    //     must provision this Secret out of band; otherwise set
    //     storage.backend=file.
    //   pawtograder-edge-functions — operator-provided Chime / GitHub /
    //     LLM credentials. Mounted optional: true on the edge runtime,
    //     so it's safe to leave absent in environments that don't use
    //     those features.

    console.log("bootstrap done");
{{- end }}
