{{- /*
ExternalSecret that materializes the `pawtograder-edge-functions` Secret
from OpenBao via External Secrets Operator (ESO).

Gated on `secrets.externalSecret.enabled` so this stays opt-in. When
enabled, the chart's pre-install stub-generation path
(secrets-bootstrap-script.yaml) skips this Secret name so ESO is the
unambiguous owner. ESO's `creationPolicy: Owner` ensures it refuses to
overwrite a Secret it didn't create — having two writers (bootstrap +
ESO) is a recipe for silent rotation.

Provisioning the upstream Bao path is a one-time operator step — see
scripts/setup-openbao-github-app.sh. The five fields written by that
script map 1:1 to the env vars _shared/GitHubWrapper.ts expects.
*/ -}}
{{- if .Values.secrets.externalSecret.enabled }}
{{- $env := required "secrets.externalSecret.env is required when secrets.externalSecret.enabled=true (e.g. preview, staging, prod)" .Values.secrets.externalSecret.env -}}
{{- $storeName := .Values.secrets.externalSecret.storeName | default "openbao" -}}
{{- $storeKind := .Values.secrets.externalSecret.storeKind | default "ClusterSecretStore" -}}
{{- $baoPath   := printf "%s/github-app-%s" (.Values.secrets.externalSecret.pathPrefix | default "apps/pawtograder") $env -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.names.edgeFunctions }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: {{ .Values.secrets.names.edgeFunctions }}
    creationPolicy: Owner
  data:
    - secretKey: GITHUB_APP_ID
      remoteRef:
        key: {{ $baoPath }}
        property: app-id
    - secretKey: GITHUB_PRIVATE_KEY_STRING
      remoteRef:
        key: {{ $baoPath }}
        property: private-key
    - secretKey: GITHUB_OAUTH_CLIENT_ID
      remoteRef:
        key: {{ $baoPath }}
        property: oauth-client-id
    - secretKey: GITHUB_OAUTH_CLIENT_SECRET
      remoteRef:
        key: {{ $baoPath }}
        property: oauth-client-secret
    - secretKey: GITHUB_WEBHOOK_SECRET
      remoteRef:
        key: {{ $baoPath }}
        property: webhook-secret
{{- end }}
