{{- /*
ExternalSecret that materializes the `pawtograder-edge-functions` Secret
from OpenBao via External Secrets Operator (ESO).

The chart pulls one OpenBao path per integration "bundle" (github-app,
aws-chime, discord, etc.) and dumps each path verbatim into the Secret
using `dataFrom: extract`. Keys at each Bao path use their literal
env-var names (GITHUB_APP_ID, DISCORD_BOT_TOKEN, ...) so adding a new
env var to a bundle requires no chart change — just `bao kv put`.

Provision the upstream Bao paths with scripts/setup-openbao-edge-functions.sh
(see --list for all known bundles).

Gated on `secrets.externalSecret.enabled` so this stays opt-in. When
enabled, the chart's pre-install stub-generation path
(secrets-bootstrap-script.yaml) skips this Secret name so ESO is the
unambiguous owner. ESO's `creationPolicy: Owner` ensures it refuses to
overwrite a Secret it didn't create — having two writers (bootstrap +
ESO) is a recipe for silent rotation.

Operator declares which bundles they've populated via
`secrets.externalSecret.bundles` — only those are pulled. A missing
Bao path is a hard sync error from ESO, so don't enable a bundle you
haven't written to Bao yet.
*/ -}}
{{- if .Values.secrets.externalSecret.enabled }}
{{- $env       := required "secrets.externalSecret.env is required when secrets.externalSecret.enabled=true (e.g. preview, staging, prod)" .Values.secrets.externalSecret.env -}}
{{- $bundles   := .Values.secrets.externalSecret.bundles | default (list "github-app") -}}
{{- $storeName := .Values.secrets.externalSecret.storeName | default "openbao" -}}
{{- $storeKind := .Values.secrets.externalSecret.storeKind | default "ClusterSecretStore" -}}
{{- $prefix    := .Values.secrets.externalSecret.pathPrefix | default "apps/pawtograder" -}}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.names.edgeFunctions }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecret.refreshInterval | default "1h" | quote }}
  secretStoreRef:
    name: {{ $storeName }}
    kind: {{ $storeKind }}
  target:
    name: {{ .Values.secrets.names.edgeFunctions }}
    creationPolicy: Owner
  dataFrom:
    {{- range $bundle := $bundles }}
    - extract:
        key: {{ $prefix }}/{{ $bundle }}-{{ $env }}
    {{- end }}
{{- end }}
