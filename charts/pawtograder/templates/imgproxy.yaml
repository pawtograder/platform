{{- if .Values.imgproxy.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pawtograder.imgproxy.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "imgproxy") | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.imgproxy.service.port }}
      targetPort: http
  selector:
    {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "imgproxy") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pawtograder.imgproxy.host" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "imgproxy") | nindent 4 }}
spec:
  replicas: {{ .Values.imgproxy.replicas }}
  selector:
    matchLabels:
      {{- include "pawtograder.componentSelectorLabels" (dict "ctx" . "component" "imgproxy") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "pawtograder.componentLabels" (dict "ctx" . "component" "imgproxy") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "pawtograder.serviceAccountName" . }}
      {{- include "pawtograder.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: imgproxy
          image: {{ include "pawtograder.image" (dict "ctx" . "image" .Values.imgproxy.image) }}
          imagePullPolicy: {{ .Values.imgproxy.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: IMGPROXY_BIND
              value: ":8080"
            - name: IMGPROXY_USE_ETAG
              value: "true"
            - name: IMGPROXY_ENABLE_WEBP_DETECTION
              value: "true"
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.imgproxy.resources | nindent 12 }}
      {{- with (include "pawtograder.nodeSelector" (dict "ctx" . "component" .Values.imgproxy)) }}
      nodeSelector:
        {{- . | nindent 8 }}
      {{- end }}
      {{- with (include "pawtograder.tolerations" (dict "ctx" . "component" .Values.imgproxy)) }}
      tolerations:
        {{- . | nindent 8 }}
      {{- end }}
{{- end }}
