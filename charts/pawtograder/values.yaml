# Default values for pawtograder.
#
# This chart deploys the entire pawtograder stack:
#   - Next.js web app
#   - PostgreSQL (supabase/postgres image — includes pgmq, pg_cron, pg_graphql)
#   - GoTrue (auth)
#   - PostgREST (REST API)
#   - Realtime (websockets, clustered)
#   - Storage API (+ imgproxy)
#   - postgres-meta + Studio
#   - Edge Functions runtime (Deno)
#   - Kong (API gateway)
#   - supavisor (connection pooler)
#
# Cluster-specific concerns (node selectors, ingress class, ESO secrets) are
# expected to come from a values overlay (e.g. values-staging.yaml in the
# deployer's own repo). Keep this file generic.

global:
  # Public hostname users hit. Used to construct site URLs, OAuth redirects,
  # and the JWT issuer claim. MUST match an ingress entry below.
  hostname: pawtograder.example.com

  # If true, the API gateway is exposed on a separate hostname (api.<hostname>).
  # If false, both web and API share `hostname` with path-based routing through
  # the web app. Default: true (separate origins, simpler CORS).
  apiOnSeparateHost: true

  # Image registry override applied to every component (unless component sets
  # its own). Useful for air-gapped clusters mirroring upstream images.
  imageRegistry: ""

  # Pod placement applied to every component as defaults. Per-component
  # overrides in `<component>.nodeSelector / affinity / tolerations` win.
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Pull secrets attached to every pod's ServiceAccount.
  imagePullSecrets: []

  # Common labels stamped onto every resource.
  commonLabels: {}

# -----------------------------------------------------------------------------
# Secrets
# -----------------------------------------------------------------------------
# Two ways to provide secrets:
#   1. Set `secrets.create=true` and provide values inline (dev/test only).
#   2. Set `secrets.create=false` and reference pre-existing Secrets created by
#      ESO / sealed-secrets / kubectl. The chart will mount them by name.
#
# Required secret material:
#   - postgres password (superuser + pawtograder role)
#   - JWT secret (HS256, 32+ bytes) — used by GoTrue, PostgREST, Realtime, Kong
#   - service_role and anon JWTs (derived from JWT secret)
#   - storage-api S3 credentials (if useS3=true)
#   - SMTP credentials (if SMTP enabled)
#   - GitHub App credentials, Discord, Canvas, LLM keys, etc. — all consumed
#     by the web pod and edge functions, never by Supabase services themselves.
secrets:
  # If true, render Secrets from the values below. NEVER use in production.
  create: false

  # If true, run a pre-install Helm hook Job that generates fresh secret
  # material (JWT keypair, postgres passwords, e2e/edge tokens) and creates
  # the k8s Secrets in-cluster if they don't already exist. Idempotent —
  # subsequent helm upgrades skip generation when Secrets exist. Designed
  # for ephemeral previews where you don't want to plumb OpenBao / ESO.
  # The Job uses node:22-alpine + the cluster's serviceaccount token; no
  # external dependencies. Studio basic-auth is NOT autogenerated; disable
  # studio.basicAuth.enabled in preview values.
  autogenerate: false

  # Names of pre-existing Secrets the chart mounts. If create=true, these
  # names are used for the rendered Secrets too.
  names:
    postgres: pawtograder-postgres
    jwt: pawtograder-jwt
    smtp: pawtograder-smtp
    s3: pawtograder-s3
    web: pawtograder-web
    edgeFunctions: pawtograder-edge-functions

  # External Secrets Operator (ESO) wiring for pawtograder-edge-functions.
  # When enabled, the chart renders an ExternalSecret that pulls one Bao
  # path per integration "bundle" and dumps each verbatim into the
  # pawtograder-edge-functions Secret via `dataFrom: extract`. Keys at
  # each Bao path are stored under their literal env-var names
  # (GITHUB_APP_ID, DISCORD_BOT_TOKEN, …) so adding a new env var to a
  # bundle requires no chart change — just rerun the script.
  #
  # Provision the upstream Bao paths with
  #   scripts/setup-openbao-edge-functions.sh --bundle <name> ...
  # (see `--list` for all known bundles). Then enable only the bundles
  # you've populated — a missing Bao path is a hard ESO sync error.
  #
  # The stub-generation path in secrets-bootstrap-script.yaml is
  # automatically suppressed when this is enabled so ESO is the
  # unambiguous owner.
  externalSecret:
    enabled: false
    env: ""                       # required when enabled: preview|staging|prod
    bundles: []                   # subset of: github-app, aws-chime, discord,
                                  #   canvas, sis, smtp, mcp, redis, sentry, misc
    storeName: openbao            # ClusterSecretStore name
    storeKind: ClusterSecretStore # or SecretStore for namespace-scoped
    pathPrefix: apps/pawtograder  # full Bao path = <pathPrefix>/<bundle>-<env>
    refreshInterval: 1h

  # Inline values used only when create=true.
  values:
    postgres:
      password: "" # superuser
      pawtograderPassword: "" # application role
      replicationPassword: ""
    jwt:
      # Generated by `npx tsx scripts/GenerateJwtKeys.ts --env`. Pawtograder
      # uses asymmetric ES256 for user session JWTs and HS256 for the long-
      # lived API keys; the JWK Set carries both kinds, distinguished by kid.
      secret: "" # HS256 secret (used to sign ANON/SERVICE only)
      anonKey: "" # HS256 JWT, role=anon
      serviceRoleKey: "" # HS256 JWT, role=service_role
      privateJwks: "" # JSON array of private JWKs (GoTrue JWT_KEYS)
      publicJwks: "" # JSON object {"keys":[…]} for verifiers
      realtimeJwks: "" # EC-only JWK Set (Joken can't take oct JWK maps)
      realtimeEncKey: "" # AES-128 (16 bytes exactly) for tenant secrets
      pgMetaCryptoKey: "" # AES-256 base64; pg-meta + Studio share this
      pgsodiumRootKey: "" # 32-byte hex; postgres mounts as file
      # Supavisor secrets — only required when supavisor.enabled=true (the
      # chart default). Each has its own length/role requirement; do NOT
      # reuse the same value across them.
      supavisorSecretKeyBase: ""    # ≥ 64 chars (Phoenix endpoint key)
      supavisorVaultEncKey: ""      # exactly 32 bytes (Vault encryption)
      supavisorApiJwtSecret: ""     # tenant management API JWT signer
      supavisorMetricsJwtSecret: "" # /metrics scrape JWT signer
      # Pre-minted scrape bearer tokens (required when monitoring.enabled=true).
      # Generated automatically by scripts/GenerateJwtKeys.ts.
      realtimeMetricsBearer: ""     # HS256 JWT signed with JWT_SECRET
      supavisorMetricsBearer: ""    # HS256 JWT signed with SUPAVISOR_METRICS_JWT_SECRET
      metricsScrapeToken: ""        # opaque random; gates /api/metrics on web
    e2e:
      # Used only when edgeFunctions.e2e.enabled=true
      endToEndSecret: ""
      edgeFunctionSecret: ""
    smtp:
      host: ""
      port: "587"
      user: ""
      pass: ""
      adminEmail: ""
      senderName: "Pawtograder"
    s3:
      accessKey: ""
      secretKey: ""

# -----------------------------------------------------------------------------
# PostgreSQL (single primary; replica support deferred to v0.2)
# -----------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"
    pullPolicy: IfNotPresent

  # `pawtograder` database name and application role.
  database: postgres
  appRole: pawtograder

  # Resources sized for ~600 concurrent realtime users on a single node.
  # Tune in overlay.
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  service:
    port: 5432

  persistence:
    enabled: true
    storageClass: "" # e.g. "local-path" or "ceph-rbd"
    size: 50Gi
    accessMode: ReadWriteOnce

  # postgresql.conf overrides — bumped for Realtime fan-out + supavisor.
  config:
    max_connections: "400"
    shared_buffers: "1GB"
    effective_cache_size: "3GB"
    max_wal_senders: "10"
    max_replication_slots: "10"
    wal_level: "logical"
    work_mem: "16MB"
    maintenance_work_mem: "256MB"
    log_min_duration_statement: "1000"
    log_lock_waits: "on"

  # shared_preload_libraries — pgsodium and supabase_vault MUST both be
  # preloaded. They're separate .so libraries with their own _PG_init and
  # their own server-secret-key state; preload triggers _PG_init which
  # reads `pgsodium.getkey_script` / `vault.getkey_script` respectively.
  # Without supabase_vault preloaded, vault.create_secret fails with
  # "pgsodium_derive: no server secret key defined" even though
  # pgsodium.derive_key() works (different library, different state).
  sharedPreloadLibraries:
    - pg_stat_statements
    - pgaudit
    - pg_cron
    - pg_net
    - auto_explain
    - pg_tle
    - supautils
    - pgsodium
    - supabase_vault

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Migrations job — runs `supabase db push`-equivalent against postgres.
# Implemented as a pre-install/pre-upgrade Helm hook.
# -----------------------------------------------------------------------------
migrations:
  enabled: true
  image:
    # An image containing /migrations + a tiny entrypoint that applies them
    # using psql. The pawtograder build pipeline produces this; until it does,
    # set this to a custom image you build from supabase/migrations/.
    repository: ghcr.io/pawtograder/migrations
    tag: "" # default: chart appVersion
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  # Hook weight controls ordering relative to other pre-install hooks. Lower
  # numbers run earlier; postgres readiness is verified by the script itself.
  hookWeight: "5"
  # On every deploy the migrator computes SHA-256 of each on-disk migration
  # and compares to the hash recorded when it was applied. A mismatch means
  # somebody edited an already-applied migration; downstream runs would
  # keep skipping the (now-edited) file and the database drifts forever
  # from the source.
  #
  # - false (default, REQUIRED for prod): mismatch is a hard error. The
  #   operator must rename the migration to a fresh timestamp, accept the
  #   drift manually, or restore the original file. Data is preserved.
  # - true (preview / dev only): the migrator drops schema public, truncates
  #   the migration history, and replays every migration from scratch.
  #   DESTROYS ALL APPLICATION DATA. Auth/storage/realtime schemas stay
  #   intact (their services own them); only public is wiped.
  resetOnDrift: false

# -----------------------------------------------------------------------------
# Seed: load supabase/seed.sql into the database. Creates a "Demo Class"
# (id=1) along with canned auth.users, assignments, rubrics, and a help
# queue. Runs as a post-install,post-upgrade Helm hook using the same
# image as `migrations`. The seed script skips itself if classes.id=1
# already exists, so re-runs are no-ops.
#
# Off by default. Enable for ephemeral previews / load-test environments;
# never enable on production.
# -----------------------------------------------------------------------------
seed:
  enabled: false
  image:
    # Built from charts/pawtograder/images/seeder/Dockerfile. Node 22 +
    # the TS scripts/ + node_modules; runs scripts/SeedDB.ts under a
    # wrapper that waits for postgres + supabase services. Separate
    # from the migrations image (which is psql-only ~50MB) because
    # this one's ~600MB and we don't want every helm upgrade pulling
    # node_modules.
    repository: ghcr.io/pawtograder/seeder
    tag: "" # default: chart appVersion (matches web/edge/migrations tags)
    pullPolicy: IfNotPresent
  resources:
    # tsx + 50-student faker seed peaks around 600 MiB. Bump if you go
    # to "medium" or larger templates.
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  # Which scripts/SeedDB.ts template to run. See that file's TEMPLATES
  # constant. Common choices: "micro" (30/1/1/2), "small" (50/5/2/20).
  template: small
  # Fixed e-mails for the first user of each role. When set, the seeder
  # weaves these accounts INTO the simulation — they are one of the
  # seeded users for each role with real submissions / grading
  # assignments / etc. Unset roles fall back to the seeder's
  # faker-generated emails.
  #
  # Pair with seed.externalSecret.enabled to also rewrite their
  # password to the shared-preview value, so reviewers can log in with
  # the credentials surfaced in the PR comment.
  fixedUsers:
    instructor: ""
    grader: ""
    student: ""
  # When enabled, the chart syncs kv/apps/pawtograder/preview-shared from
  # OpenBao into a pawtograder-preview-shared Secret. The seed job
  # consumes the password from that Secret as TEST_PASSWORD, which
  # DatabaseSeedingUtils uses when creating auth users — so the entire
  # seeded class shares the documented preview password.
  #
  # Provision the upstream Bao path once per cluster:
  #   scripts/setup-openbao-preview-shared.sh
  #
  # Without this, the seeder falls back to TEST_PASSWORD's default
  # ("change-it") which is fine for local dev but ugly for previews.
  externalSecret:
    enabled: false
    storeName: openbao
    storeKind: ClusterSecretStore
    path: apps/pawtograder/preview-shared
    refreshInterval: 1h

# -----------------------------------------------------------------------------
# Supavisor (Postgres connection pooler — replaces pgbouncer)
# -----------------------------------------------------------------------------
supavisor:
  enabled: true
  replicas: 2
  image:
    repository: supabase/supavisor
    tag: "2.7.4" # stock supabase docker-compose pin
    pullPolicy: IfNotPresent
  poolSize: 25 # per tenant
  maxClientConn: 1000
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits: { cpu: "1", memory: "1Gi" }
  service:
    port: 6543 # transaction-mode pool
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# GoTrue (auth)
# -----------------------------------------------------------------------------
auth:
  enabled: true
  replicas: 2
  image:
    repository: supabase/gotrue
    tag: "v2.186.0" # stock supabase docker-compose pin
    pullPolicy: IfNotPresent
  jwtExpiry: 3600
  disableSignup: false
  enableEmailSignup: true
  enableEmailAutoconfirm: true
  enableAnonymousUsers: false
  # The web app links GitHub/Discord identities via supabase.auth.linkIdentity,
  # which needs GoTrue manual linking on (else `manual_linking_disabled`).
  manualLinkingEnabled: true

  # custom_access_token_hook — pawtograder requires this for role/class claims.
  customAccessTokenHook:
    enabled: true
    uri: pg-functions://postgres/public/custom_access_token_hook

  # External OAuth providers. Credentials live in the `web` secret (the chart
  # passes them through to GoTrue via env). Set enabled=true per provider.
  external:
    # Provider OAuth client id/secret are read from the `web` Secret as
    # <PROVIDER>_OAUTH_CLIENT_ID / <PROVIDER>_OAUTH_CLIENT_SECRET.
    github:
      enabled: false
      redirectUri: "" # default: https://<hostname>/auth/v1/callback
    azure:
      enabled: false
    discord:
      enabled: false
      redirectUri: "" # default: https://<hostname>/auth/v1/callback

  smtp:
    enabled: false
    # adminEmail (the From: address) is read from the smtp Secret key
    # SMTP_ADMIN_EMAIL, alongside SMTP_HOST/PORT/USER/PASS — it lives with
    # the other SMTP creds rather than baked into values.
    senderName: "Pawtograder"
    # Optional in-cluster socat relay for clusters whose upstream blocks
    # outbound SMTP submission ports (see templates/smtp-relay.yaml). When
    # enabled, point GOTRUE's SMTP_HOST at the real provider hostname and
    # CoreDNS-rewrite that hostname → the pawtograder-smtp-relay Service so
    # STARTTLS cert verification still passes end-to-end.
    relay:
      enabled: false
      image: "alpine/socat:1.8.0.3"
      port: 587
      # host:port of the egress endpoint that tunnels out to the SMTP
      # provider (e.g. a campus LXC listener). Required when enabled.
      downstream: ""
      # Optional TCP MSS clamp on the downstream connection. Set when the
      # pod→downstream path crosses an overlay/encap hop with a lower MTU and
      # no working PMTUD (else the STARTTLS cert exchange blackholes). ~1300
      # is a safe value; leave unset to disable.
      mss: ""
      resources:
        requests: { cpu: "10m", memory: "16Mi" }
        limits: { memory: "64Mi" }

  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "500m", memory: "512Mi" }
  service:
    port: 9999
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# PostgREST
# -----------------------------------------------------------------------------
rest:
  enabled: true
  replicas: 2
  # Connection-pool sizing. dbPool=40 paired with a 30s acquisition
  # timeout was chosen so the chart's postgres.config.max_connections
  # (400 by default; see the postgres block) isn't blown out even at
  # 3 replicas: 3 × 40 = 120, well under 400. Bump in lockstep with
  # postgres.config.max_connections if you scale rest replicas past
  # ~9.
  dbPool: 40
  dbPoolAcquisitionTimeout: 30
  image:
    repository: postgrest/postgrest
    tag: "v14.8" # stock supabase docker-compose pin — major bump from v12
    pullPolicy: IfNotPresent
  schemas: "public,graphql_public,pgmq_public"
  extraSearchPath: "public,extensions"
  maxRows: 1000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  service:
    port: 3000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Realtime (clustered for ~600 concurrent WS)
# -----------------------------------------------------------------------------
realtime:
  enabled: true
  replicas: 3
  image:
    repository: supabase/realtime
    tag: "v2.76.5" # stock supabase docker-compose pin — fixes partition / metrics auth
    pullPolicy: IfNotPresent
  # BEAM clustering — pods discover peers via a headless Service.
  cluster:
    strategy: "Elixir.Cluster.Strategy.Kubernetes.DNS"
    nodeBasename: "realtime"
  # Tune timeouts/queue sizes for high WS counts. See realtime docs for full
  # list of env knobs (RUN_JANITOR, MAX_HEADER_LENGTH, etc.).
  maxHeaderLength: 4096
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits: { cpu: "2", memory: "2Gi" }
  service:
    port: 4000
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # PodAntiAffinity to spread realtime pods across nodes when more than one
  # node carries the deployment tier. Has no effect on a single-node tier.
  spreadAcrossNodes: true

# -----------------------------------------------------------------------------
# Storage API (+ imgproxy)
# -----------------------------------------------------------------------------
storage:
  enabled: true
  replicas: 2
  image:
    repository: supabase/storage-api
    tag: "v1.48.26" # stock supabase docker-compose pin
    pullPolicy: IfNotPresent

  # Backend selection. S3 is strongly recommended for k8s — avoids RWX PVCs.
  backend: s3 # one of: s3, file
  fileSizeLimit: "52428800" # 50 MiB, matches config.toml

  s3:
    # Endpoint URL of the S3-compatible store (MinIO, AWS S3, R2…).
    endpoint: ""
    region: "us-east-1"
    bucket: "pawtograder"
    forcePathStyle: true # required for MinIO

  # When backend=file, mount this PVC. (Discouraged unless you know why.)
  persistence:
    enabled: false
    storageClass: ""
    size: 20Gi
    accessMode: ReadWriteMany

  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  service:
    port: 5000
  nodeSelector: {}
  tolerations: []
  affinity: {}

imgproxy:
  enabled: true
  replicas: 1
  image:
    repository: darthsim/imgproxy
    tag: "v3.27.2"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  service:
    port: 5001

# -----------------------------------------------------------------------------
# postgres-meta + Studio
# -----------------------------------------------------------------------------
meta:
  enabled: true
  image:
    repository: supabase/postgres-meta
    tag: "v0.96.3"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "256Mi" }
  service:
    port: 8080

studio:
  enabled: true
  image:
    repository: supabase/studio
    tag: "2026.04.27-sha-5f60601"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits: { cpu: "1", memory: "512Mi" }
  service:
    port: 3000
  # Studio is admin-only. Default-disabled in ingress; enable + lock down
  # in your ingress overlay (auth, IP allowlist, mTLS, etc.).
  ingressEnabled: false
  # Basic-auth gate for the Studio host. Studio itself has no auth, so
  # exposing the ingress without this means anyone with the URL gets full
  # database control. Secret must contain an `auth` key with htpasswd-format
  # lines (one user:hash per line). Generate via `htpasswd -nbB <user> <pw>`.
  basicAuth:
    enabled: false
    secretName: pawtograder-studio-auth
    realm: "Pawtograder Studio"
    tlsSecretName: ""   # default: same as ingress.tls.secretName

# -----------------------------------------------------------------------------
# Edge Functions (Deno)
# -----------------------------------------------------------------------------
# Redis (Bottleneck rate-limiter state, webhook tracking, sync cache)
# -----------------------------------------------------------------------------
# Three modes (no per-release Redis deployment — same shape as MinIO):
#
#   external (default)
#     The chart renders nothing. Operator provisions
#     UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN out-of-band via
#     pawtograder-edge-functions (or wherever the edge runtime gets its
#     envFrom secrets). Works with managed Upstash, Cloudflare R2,
#     anything that speaks the Upstash REST protocol.
#
#   shared
#     The chart renders an ExternalSecret that ESO syncs into a
#     pawtograder-redis Secret from OpenBao at
#     `kv/apps/pawtograder/redis-shared` (key: REDIS_URL). The edge
#     runtime additionally mounts pawtograder-redis via envFrom and the
#     Redis.ts factory picks the ioredis branch when REDIS_URL is set.
#
#     The shared Redis itself lives in a separate cluster-scoped
#     namespace (single instance, single password — see
#     charts/pawtograder/examples/shared-redis/ for the bootstrap
#     manifests). All previews point at the same Redis, isolated by
#     Bottleneck's key namespacing (limiter ids include the class +
#     env so collisions across previews are not a concern).
#
#   disabled
#     Chart renders nothing. Edge functions check for the env vars
#     before use and degrade gracefully (rate-limiting falls back to
#     local-only, webhook tracking returns null, etc.).
redis:
  # How web + edge functions obtain REDIS_URL (cross-replica Next.js SSR cache,
  # GitHub/Discord rate limiters, and webhook dedup). Redis state here is
  # RECONSTRUCTABLE — losing it is not data loss — so the internal Redis may run
  # without persistence.
  #   external — you provide a `pawtograder-redis` Secret with REDIS_URL out of
  #              band (Upstash, or a cluster Redis you manage yourself).
  #   shared   — sync REDIS_URL from a secret store (ESO) pointing at a
  #              cluster-wide shared Redis you run OUTSIDE this release.
  #   internal — deploy a Redis with THIS chart and wire REDIS_URL to it.
  provider: external
  shared:
    storeName: openbao
    storeKind: ClusterSecretStore
    path: apps/pawtograder/redis-shared
    refreshInterval: 1h
  # Used only when provider=internal. Deploys a single-replica Redis, owns the
  # `pawtograder-redis` Secret (REDIS_URL [+ REDIS_PASSWORD]) that web/edge mount.
  internal:
    image:
      repository: redis
      tag: "7.4.2-alpine"
      pullPolicy: IfNotPresent
    service:
      port: 6379
    # AUTH. When enabled, the chart generates a password ONCE and preserves it
    # across upgrades (lookup of the existing pawtograder-redis Secret), embeds
    # it in REDIS_URL, and starts redis with --requirepass. With GitOps/Fleet
    # the helm render runs server-side so the lookup keeps the password stable;
    # `helm template` with no cluster regenerates it (fine for dry-run only).
    # Disable for a no-auth in-namespace cache (gate with a NetworkPolicy).
    auth:
      enabled: true
      # Optional explicit override. Leave empty to auto-generate; do NOT commit
      # a real secret here in a GitOps repo.
      password: ""
    # OPTIONAL — the data is reconstructable. Off = pure in-memory (RDB+AOF
    # disabled, no volume). On = a PVC with append-only persistence.
    persistence:
      enabled: false
      storageClass: ""
      size: 8Gi
    # maxmemory bounds the pod; allkeys-lru evicts coldest keys when full —
    # safe for a cache + limiter store.
    maxmemory: "768mb"
    maxmemoryPolicy: "allkeys-lru"
    resources:
      requests: { cpu: "100m", memory: "256Mi" }
      limits: { cpu: "1", memory: "1Gi" }
    nodeSelector: {}
    tolerations: []

# -----------------------------------------------------------------------------
# The functions themselves are baked into a per-release image by the
# pawtograder build pipeline (FROM supabase/edge-runtime + COPY supabase/functions).
# Configure env vars consumed by functions in `web.envFrom`-style secrets.
edgeFunctions:
  enabled: true
  replicas: 2
  # End-to-end / load-test gates. Pawtograder edge functions check these
  # to enable test-only privileged paths (e2e helpers) and to mock the
  # GitHub integration so k6 runs don't actually call github.com.
  e2e:
    enabled: false
    mockGitHub: false
  # Names of additional Secrets to envFrom into the edge-runtime pod
  # (each marked optional, so absent secrets don't block startup). Use for
  # integration credentials managed by ESO in your overlay.
  envFromSecrets: []
  image:
    repository: ghcr.io/pawtograder/edge-functions
    tag: "" # default: chart appVersion
    pullPolicy: IfNotPresent
  policy: per_worker # per_worker | per_request | oneshot. per_request gives each
                     # request its own isolate (no concurrent co-location → no shared-heap
                     # memory pile-up under bursts); per_worker co-locates for efficiency.
  # Cap on simultaneous worker isolates (--max-parallelism). Unset, the runtime
  # derives it from CPU cores, which is low on small pods and forces co-location.
  # Under per_request this is effectively the max concurrent requests per pod
  # (excess queue up to request-wait-timeout). Empty = runtime default.
  maxParallelism: ""
  verifyJwt: false # all functions in pawtograder set this; auth handled in-function
  # "beforeunload" / EarlyDrop thresholds (% of each per-worker resource limit).
  # When a per_worker isolate crosses the ratio the runtime tells it to finish
  # the current request and retire, then replaces it with a fresh isolate — this
  # is the ONLY way per_worker memory gets reclaimed (V8 never returns heap to
  # the OS). The runtime default is 90%, which is too late: a concurrent burst
  # overshoots the hard cap before the worker drains and gets hard-killed
  # (request cancelled). supabase.com uses ~50% of any resource; matching that
  # gives workers headroom to finish in-flight requests and recycle cleanly.
  beforeUnload:
    memoryRatio: 50
    cpuRatio: 50
    wallClockRatio: 50
  # Per-isolate worker limits (the main.ts demuxer reads these from env),
  # matching supabase.com's hosted edge runtime. The runtime reuses a worker
  # across requests and retires it gracefully as it nears these limits; main.ts
  # retries retired workers on a fresh isolate. memoryLimitMb is intentionally
  # modest (hosted runs 150–256) — under load the lifecycle handling matters far
  # more than the ceiling. The 2s CPU soft limit (matching hosted's documented
  # 2s) is the key knob: it retires busy workers frequently so memory never
  # accumulates toward the 256MB cap. cpuHardMs keeps headroom above soft so an
  # in-flight request that crosses 2s can finish rather than being force-cancelled
  # (CPU time excludes async I/O, so 2s of real compute is ample here).
  worker:
    memoryLimitMb: 256
    timeoutMs: 400000 # 400s worker lifetime (hosted paid-plan default)
    cpuSoftMs: 2000 # graceful-retire signal (matches hosted's 2s) — drives frequent recycling
    cpuHardMs: 5000 # hard kill; headroom above soft so in-flight requests finish
    # Memory early-drop (hosted "EarlyDrop"): isolate finishes the current request
    # and retires once memory crosses ~memoryLimitMb/lowMemoryMultiplier. 2 ≈ the
    # hosted "50% of any resource" rule (~128MB at 256MB). This lets a memory-heavy
    # request finish + return instead of being force-killed at the hard cap.
    lowMemoryMultiplier: 2
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits: { cpu: "2", memory: "2Gi" }
  # Horizontal autoscaling. When enabled, a HorizontalPodAutoscaler manages the
  # replica count (and the Deployment's static `replicas` is omitted so the two
  # don't fight). minReplicas should be high enough that a sudden burst spreads
  # ~1 request per isolate rather than concentrating on a few pods.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetMemoryUtilizationPercentage: 100
    targetCPUUtilizationPercentage: 200
  service:
    port: 9000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Kong (API gateway)
# -----------------------------------------------------------------------------
kong:
  enabled: true
  replicas: 2
  # Upstream keepalive. A small pool + short idle timeout keeps kong from
  # pinning load onto a stale subset of upstream pods — important for the
  # autoscaled edge-functions upstream, where the default pool (60) makes
  # bursts reuse pinned connections and starve HPA-added pods. Small pool ⇒
  # bursts open fresh connections that cilium spreads across all endpoints.
  upstreamKeepalive:
    poolSize: 16
    idleTimeoutSeconds: 15
  image:
    repository: kong
    tag: "3.9.1" # stock supabase docker-compose pin
    pullPolicy: IfNotPresent
  # Kong's nginx workers spike well past 512Mi at startup; 6Gi is plenty
  # of headroom and the prod-staging node has the RAM to spare.
  resources:
    requests: { cpu: "200m", memory: "1Gi" }
    limits: { cpu: "2", memory: "6Gi" }
  service:
    port: 8000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Web (Next.js)
# -----------------------------------------------------------------------------
web:
  enabled: true
  # E2E test bypass: only set true on preview / test deploys. See web.yaml
  # for what it controls (CSP report-only mode). NEVER in production.
  e2e:
    enabled: false
  # When true, /api/metrics refreshes the DB-backed workflow gauges
  # (workflow runs, queue/run percentiles, recent errors) on every
  # scrape. Set on AT MOST ONE pod across the deploy — multiple replicas
  # with this on multiply DB load and over-count gauges. Safe to enable
  # for single-replica installs (previews); for multi-replica prod
  # leave off here and run a dedicated 1-replica metrics-leader.
  workflowMetricsLeader: false
  replicas: 2
  image:
    repository: ghcr.io/pawtograder/web
    tag: "" # default: chart appVersion
    pullPolicy: IfNotPresent

  # Public URL of the API gateway (Kong). If apiOnSeparateHost=true, default
  # is https://api.<hostname>. Override here for unusual topologies.
  apiUrl: ""

  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits: { cpu: "2", memory: "2Gi" }
  service:
    port: 3000

  # Extra env vars passed to the Next.js pod. Use this for integration creds
  # that aren't part of the standard secret bundle (e.g. additional LLM keys).
  extraEnv: []
  # - name: FOO
  #   value: "bar"

  # Reference Secrets that should be mounted via envFrom. Use for ESO-managed
  # bundles (GitHub App key, Canvas, Discord, LLM, etc.).
  envFromSecrets: []
  # - pawtograder-github-app
  # - pawtograder-canvas
  # - pawtograder-discord
  # - pawtograder-llm

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Ingress (cluster-agnostic; provide ingressClassName + TLS in overlay)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    enabled: true
    secretName: pawtograder-tls
  # Hosts default to: <hostname> for web, api.<hostname> for kong (if
  # apiOnSeparateHost). Override only if you need extra hostnames.
  extraHosts: []

# -----------------------------------------------------------------------------
# CronJobs
# -----------------------------------------------------------------------------
auditPartitions:
  enabled: true
  schedule: "0 3 * * *" # nightly
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"

backup:
  enabled: false
  schedule: "0 4 * * *"
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"
  s3:
    endpoint: ""
    region: "us-east-1"
    bucket: "pawtograder-backups"
  retentionDays: 14
  # `mc` (MinIO client) is downloaded at runtime because the
  # supabase/postgres image doesn't include it. Pin both URL and
  # SHA256 together; any mismatch fails the job before secrets are
  # used. Update both when bumping the version.
  mc:
    url: "https://dl.min.io/client/mc/release/linux-amd64/archive/mc.RELEASE.2025-08-13T08-35-41Z"
    sha256: "01f866e9c5f9b87c2b09116fa5d7c06695b106242d829a8bb32990c00312e891"

# -----------------------------------------------------------------------------
# ServiceAccount
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# -----------------------------------------------------------------------------
# Monitoring (Prometheus scraping + Grafana dashboards + Loki logs)
#
# Designed for clusters that already run kube-prometheus-stack:
#   - ServiceMonitor CRs are auto-discovered by the cluster's Prometheus.
#   - Grafana auto-loads ConfigMaps labeled `grafana_dashboard: "1"`
#     from any namespace via its sidecar.
# If your cluster doesn't have those CRDs, leave `enabled: false` — the
# chart skips every monitoring template instead of failing to render.
#
# Required scrape bearer tokens (REALTIME_METRICS_BEARER,
# SUPAVISOR_METRICS_BEARER, METRICS_SCRAPE_TOKEN) are generated by the
# autogenerate path or scripts/GenerateJwtKeys.ts. The chart references
# them by key from the pawtograder-jwt Secret.
# -----------------------------------------------------------------------------
monitoring:
  enabled: false
  scrapeInterval: 30s
  scrapeTimeout: 10s

  # postgres_exporter sidecar in the postgres pod. Connects via TCP to
  # localhost:5432 with supabase_admin. The custom queries ConfigMap is
  # rendered by templates/monitoring.yaml (label
  # `app.kubernetes.io/component=postgres-exporter`).
  postgresExporter:
    image:
      repository: quay.io/prometheuscommunity/postgres-exporter
      tag: "v0.18.0"
      pullPolicy: IfNotPresent
    resources:
      requests: { cpu: "20m",  memory: "32Mi" }
      limits:   { cpu: "200m", memory: "128Mi" }

  # Grafana dashboards shipped by the chart. Each is a ConfigMap with
  # label `grafana_dashboard: "1"` so the kps-grafana sidecar mounts
  # them automatically. Disable individual dashboards if your platform
  # team owns them out-of-band.
  dashboards:
    stackOverview:    true
    postgresDeepDive: true
    realtimeFanout:   true
    edgeFunctions:    true
    appBusiness:      true
    rateLimiting:     true
    edgeSoak:         true

  # Logs are NOT deployed by this chart. Log collection (Alloy
  # DaemonSet shipping into a central Loki) is a cluster-level concern
  # and lives in /home/jon/work/k8s/apps/monitoring/. The chart's only
  # responsibility for logs is emitting structured pino-style JSON from
  # the web app's stdout; the cluster Alloy joins pod labels and ships
  # to Loki for you. Querying: Grafana Explore → Loki datasource →
  # {namespace="pawtograder-preview-pr-<id>"}.
