# Default values for pawtograder.
#
# This chart deploys the entire pawtograder stack:
#   - Next.js web app
#   - PostgreSQL (supabase/postgres image — includes pgmq, pg_cron, pg_graphql)
#   - GoTrue (auth)
#   - PostgREST (REST API)
#   - Realtime (websockets, clustered)
#   - Storage API (+ imgproxy)
#   - postgres-meta + Studio
#   - Edge Functions runtime (Deno)
#   - Kong (API gateway)
#   - supavisor (connection pooler)
#
# Cluster-specific concerns (node selectors, ingress class, ESO secrets) are
# expected to come from a values overlay (e.g. values-staging.yaml in the
# deployer's own repo). Keep this file generic.

global:
  # Public hostname users hit. Used to construct site URLs, OAuth redirects,
  # and the JWT issuer claim. MUST match an ingress entry below.
  hostname: pawtograder.example.com

  # If true, the API gateway is exposed on a separate hostname (api.<hostname>).
  # If false, both web and API share `hostname` with path-based routing through
  # the web app. Default: true (separate origins, simpler CORS).
  apiOnSeparateHost: true

  # Image registry override applied to every component (unless component sets
  # its own). Useful for air-gapped clusters mirroring upstream images.
  imageRegistry: ""

  # Pod placement applied to every component as defaults. Per-component
  # overrides in `<component>.nodeSelector / affinity / tolerations` win.
  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Pull secrets attached to every pod's ServiceAccount.
  imagePullSecrets: []

  # Common labels stamped onto every resource.
  commonLabels: {}

# -----------------------------------------------------------------------------
# Secrets
# -----------------------------------------------------------------------------
# Two ways to provide secrets:
#   1. Set `secrets.create=true` and provide values inline (dev/test only).
#   2. Set `secrets.create=false` and reference pre-existing Secrets created by
#      ESO / sealed-secrets / kubectl. The chart will mount them by name.
#
# Required secret material:
#   - postgres password (superuser + pawtograder role)
#   - JWT secret (HS256, 32+ bytes) — used by GoTrue, PostgREST, Realtime, Kong
#   - service_role and anon JWTs (derived from JWT secret)
#   - storage-api S3 credentials (if useS3=true)
#   - SMTP credentials (if SMTP enabled)
#   - GitHub App credentials, Discord, Canvas, LLM keys, etc. — all consumed
#     by the web pod and edge functions, never by Supabase services themselves.
secrets:
  # If true, render Secrets from the values below. NEVER use in production.
  create: false

  # Names of pre-existing Secrets the chart mounts. If create=true, these
  # names are used for the rendered Secrets too.
  names:
    postgres: pawtograder-postgres
    jwt: pawtograder-jwt
    smtp: pawtograder-smtp
    s3: pawtograder-s3
    web: pawtograder-web
    edgeFunctions: pawtograder-edge-functions

  # Inline values used only when create=true.
  values:
    postgres:
      password: ""              # superuser
      pawtograderPassword: ""   # application role
      replicationPassword: ""
    jwt:
      # Generated by `npx tsx scripts/GenerateJwtKeys.ts --env`. Pawtograder
      # uses asymmetric ES256 for user session JWTs and HS256 for the long-
      # lived API keys; the JWK Set carries both kinds, distinguished by kid.
      secret: ""                # HS256 secret (used to sign ANON/SERVICE only)
      anonKey: ""               # HS256 JWT, role=anon
      serviceRoleKey: ""        # HS256 JWT, role=service_role
      privateJwks: ""           # JSON array of private JWKs (GoTrue JWT_KEYS)
      publicJwks: ""            # JSON object {"keys":[…]} for verifiers
    smtp:
      host: ""
      port: "587"
      user: ""
      pass: ""
      adminEmail: ""
      senderName: "Pawtograder"
    s3:
      accessKey: ""
      secretKey: ""

# -----------------------------------------------------------------------------
# PostgreSQL (single primary; replica support deferred to v0.2)
# -----------------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"
    pullPolicy: IfNotPresent

  # `pawtograder` database name and application role.
  database: postgres
  appRole: pawtograder

  # Resources sized for ~600 concurrent realtime users on a single node.
  # Tune in overlay.
  resources:
    requests:
      cpu: "1"
      memory: "4Gi"
    limits:
      cpu: "4"
      memory: "8Gi"

  service:
    port: 5432

  persistence:
    enabled: true
    storageClass: ""            # e.g. "local-path" or "ceph-rbd"
    size: 50Gi
    accessMode: ReadWriteOnce

  # postgresql.conf overrides — bumped for Realtime fan-out + supavisor.
  config:
    max_connections: "400"
    shared_buffers: "1GB"
    effective_cache_size: "3GB"
    max_wal_senders: "10"
    max_replication_slots: "10"
    wal_level: "logical"
    work_mem: "16MB"
    maintenance_work_mem: "256MB"
    log_min_duration_statement: "1000"
    log_lock_waits: "on"

  # shared_preload_libraries — kept in sync with supabase/postgres image
  # defaults plus pgmq (used by pawtograder for queues).
  sharedPreloadLibraries:
    - pg_stat_statements
    - pgaudit
    - plpgsql
    - plpgsql_check
    - pg_cron
    - pg_net
    - timescaledb
    - auto_explain
    - pg_tle
    - supautils
    - pgmq

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Migrations job — runs `supabase db push`-equivalent against postgres.
# Implemented as a pre-install/pre-upgrade Helm hook.
# -----------------------------------------------------------------------------
migrations:
  enabled: true
  image:
    # An image containing /migrations + a tiny entrypoint that applies them
    # using psql. The pawtograder build pipeline produces this; until it does,
    # set this to a custom image you build from supabase/migrations/.
    repository: ghcr.io/pawtograder/migrations
    tag: ""                     # default: chart appVersion
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  # Hook weight controls ordering relative to other pre-install hooks. Lower
  # numbers run earlier; postgres readiness is verified by the script itself.
  hookWeight: "5"

# -----------------------------------------------------------------------------
# Supavisor (Postgres connection pooler — replaces pgbouncer)
# -----------------------------------------------------------------------------
supavisor:
  enabled: true
  replicas: 2
  image:
    repository: supabase/supavisor
    tag: "2.5.7"
    pullPolicy: IfNotPresent
  poolSize: 25                  # per tenant
  maxClientConn: 1000
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  service:
    port: 6543                  # transaction-mode pool
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# GoTrue (auth)
# -----------------------------------------------------------------------------
auth:
  enabled: true
  replicas: 2
  image:
    repository: supabase/gotrue
    tag: "v2.176.1"
    pullPolicy: IfNotPresent
  jwtExpiry: 3600
  disableSignup: false
  enableEmailSignup: true
  enableEmailAutoconfirm: true
  enableAnonymousUsers: false

  # custom_access_token_hook — pawtograder requires this for role/class claims.
  customAccessTokenHook:
    enabled: true
    uri: pg-functions://postgres/public/custom_access_token_hook

  # External OAuth providers. Credentials live in the `web` secret (the chart
  # passes them through to GoTrue via env). Set enabled=true per provider.
  external:
    github:
      enabled: false
      redirectUri: ""           # default: https://<hostname>/auth/v1/callback
    azure:
      enabled: false

  smtp:
    enabled: false
    adminEmail: ""
    senderName: "Pawtograder"

  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  service:
    port: 9999
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# PostgREST
# -----------------------------------------------------------------------------
rest:
  enabled: true
  replicas: 2
  image:
    repository: postgrest/postgrest
    tag: "v12.2.12"
    pullPolicy: IfNotPresent
  schemas: "public,graphql_public,pgmq_public"
  extraSearchPath: "public,extensions"
  maxRows: 1000
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    port: 3000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Realtime (clustered for ~600 concurrent WS)
# -----------------------------------------------------------------------------
realtime:
  enabled: true
  replicas: 3
  image:
    repository: supabase/realtime
    tag: "v2.34.47"
    pullPolicy: IfNotPresent
  # BEAM clustering — pods discover peers via a headless Service.
  cluster:
    strategy: "Elixir.Cluster.Strategy.Kubernetes.DNS"
    nodeBasename: "realtime"
  # Tune timeouts/queue sizes for high WS counts. See realtime docs for full
  # list of env knobs (RUN_JANITOR, MAX_HEADER_LENGTH, etc.).
  maxHeaderLength: 4096
  resources:
    requests: { cpu: "500m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  service:
    port: 4000
  nodeSelector: {}
  tolerations: []
  affinity: {}
  # PodAntiAffinity to spread realtime pods across nodes when more than one
  # node carries the deployment tier. Has no effect on a single-node tier.
  spreadAcrossNodes: true

# -----------------------------------------------------------------------------
# Storage API (+ imgproxy)
# -----------------------------------------------------------------------------
storage:
  enabled: true
  replicas: 2
  image:
    repository: supabase/storage-api
    tag: "v1.27.5"
    pullPolicy: IfNotPresent

  # Backend selection. S3 is strongly recommended for k8s — avoids RWX PVCs.
  backend: s3                   # one of: s3, file
  fileSizeLimit: "52428800"     # 50 MiB, matches config.toml

  s3:
    # Endpoint URL of the S3-compatible store (MinIO, AWS S3, R2…).
    endpoint: ""
    region: "us-east-1"
    bucket: "pawtograder"
    forcePathStyle: true        # required for MinIO

  # When backend=file, mount this PVC. (Discouraged unless you know why.)
  persistence:
    enabled: false
    storageClass: ""
    size: 20Gi
    accessMode: ReadWriteMany

  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    port: 5000
  nodeSelector: {}
  tolerations: []
  affinity: {}

imgproxy:
  enabled: true
  replicas: 1
  image:
    repository: darthsim/imgproxy
    tag: "v3.27.2"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "128Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    port: 5001

# -----------------------------------------------------------------------------
# postgres-meta + Studio
# -----------------------------------------------------------------------------
meta:
  enabled: true
  image:
    repository: supabase/postgres-meta
    tag: "v0.91.0"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "256Mi" }
  service:
    port: 8080

studio:
  enabled: true
  image:
    repository: supabase/studio
    tag: "2025.10.27-sha-7891ee2"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    port: 3000
  # Studio is admin-only. Default-disabled in ingress; enable + lock down
  # in your ingress overlay (auth, IP allowlist, mTLS, etc.).
  ingressEnabled: false

# -----------------------------------------------------------------------------
# Edge Functions (Deno)
# -----------------------------------------------------------------------------
# The functions themselves are baked into a per-release image by the
# pawtograder build pipeline (FROM supabase/edge-runtime + COPY supabase/functions).
# Configure env vars consumed by functions in `web.envFrom`-style secrets.
edgeFunctions:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/pawtograder/edge-functions
    tag: ""                     # default: chart appVersion
    pullPolicy: IfNotPresent
  policy: per_worker            # matches supabase/config.toml
  verifyJwt: false              # all functions in pawtograder set this; auth handled in-function
  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  service:
    port: 9000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Kong (API gateway)
# -----------------------------------------------------------------------------
kong:
  enabled: true
  replicas: 2
  image:
    repository: kong
    tag: "3.7.1"
    pullPolicy: IfNotPresent
  resources:
    requests: { cpu: "200m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "512Mi" }
  service:
    port: 8000
  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Web (Next.js)
# -----------------------------------------------------------------------------
web:
  enabled: true
  replicas: 2
  image:
    repository: ghcr.io/pawtograder/web
    tag: ""                     # default: chart appVersion
    pullPolicy: IfNotPresent

  # Public URL of the API gateway (Kong). If apiOnSeparateHost=true, default
  # is https://api.<hostname>. Override here for unusual topologies.
  apiUrl: ""

  resources:
    requests: { cpu: "200m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  service:
    port: 3000

  # Extra env vars passed to the Next.js pod. Use this for integration creds
  # that aren't part of the standard secret bundle (e.g. additional LLM keys).
  extraEnv: []
  # - name: FOO
  #   value: "bar"

  # Reference Secrets that should be mounted via envFrom. Use for ESO-managed
  # bundles (GitHub App key, Canvas, Discord, LLM, etc.).
  envFromSecrets: []
  # - pawtograder-github-app
  # - pawtograder-canvas
  # - pawtograder-discord
  # - pawtograder-llm

  nodeSelector: {}
  tolerations: []
  affinity: {}

# -----------------------------------------------------------------------------
# Ingress (cluster-agnostic; provide ingressClassName + TLS in overlay)
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: ""
  annotations: {}
  tls:
    enabled: true
    secretName: pawtograder-tls
  # Hosts default to: <hostname> for web, api.<hostname> for kong (if
  # apiOnSeparateHost). Override only if you need extra hostnames.
  extraHosts: []

# -----------------------------------------------------------------------------
# CronJobs
# -----------------------------------------------------------------------------
auditPartitions:
  enabled: true
  schedule: "0 3 * * *"         # nightly
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"

backup:
  enabled: false
  schedule: "0 4 * * *"
  image:
    repository: supabase/postgres
    tag: "17.4.1.075"
  s3:
    endpoint: ""
    region: "us-east-1"
    bucket: "pawtograder-backups"
  retentionDays: 14

# -----------------------------------------------------------------------------
# ServiceAccount
# -----------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""
