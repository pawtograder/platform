# Per-PR / per-branch preview overlay.
#
# Usage from CI:
#   helm upgrade --install pawtograder-pr-${PR_NUMBER} \
#     oci://ghcr.io/pawtograder/charts/pawtograder \
#     --version <chart_version> \
#     --namespace pawtograder-preview-pr${PR_NUMBER} \
#     --create-namespace \
#     -f charts/pawtograder/examples/values-preview.yaml \
#     --set global.hostname=pr-${PR_NUMBER}.preview.pawtograder.net \
#     --set web.image.tag=pr-${PR_NUMBER}-${SHORT_SHA} \
#     --set edgeFunctions.image.tag=pr-${PR_NUMBER}-${SHORT_SHA} \
#     --set migrations.image.tag=pr-${PR_NUMBER}-${SHORT_SHA}
#
# On PR close:
#   helm uninstall pawtograder-pr-${PR_NUMBER} --namespace pawtograder-preview-pr${PR_NUMBER}
#   kubectl delete namespace pawtograder-preview-pr${PR_NUMBER}

global:
  # Set per-preview from CI: e.g. pr-123.preview.pawtograder.net
  hostname: REPLACE_PER_PREVIEW.preview.pawtograder.net
  apiOnSeparateHost: true
  # Previews run on the general worker pool, NOT the prod-staging tier.
  # Keep node selectors / tolerations empty.
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Generate fresh secrets in-cluster on first install. No bao, no ESO,
# no manual setup. Each preview gets its own keypair + passwords.
secrets:
  autogenerate: true

# Single Ingress for the chart's main hosts. The cert-manager annotation
# auto-provisions a Certificate per preview from the *.pawtograder.net
# wildcard issuer.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "55m"
  tls:
    enabled: true
    secretName: pawtograder-preview-tls

# ----- Postgres on shared ceph-rbd (no local SSD) ----------------------------
postgres:
  persistence:
    storageClass: ceph-rbd
    size: 10Gi
  resources:
    requests: { cpu: "100m", memory: "512Mi" }
    limits:   { cpu: "2",    memory: "2Gi" }
  config:
    # Slower disks → trade durability for throughput. Previews are
    # ephemeral; data loss on crash is fine.
    synchronous_commit: "off"
    fsync: "off"
    full_page_writes: "off"
    max_connections: "100"
    shared_buffers: "256MB"
    effective_cache_size: "1GB"
    work_mem: "8MB"
    maintenance_work_mem: "128MB"
    wal_level: "logical"
    max_wal_senders: "10"
    max_replication_slots: "10"

# ----- Stateless tier: minimal replicas --------------------------------------
auth:
  replicas: 1
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

rest:
  replicas: 1
  # 512Mi was OOM-killed under modest staging traffic; 1Gi for safety
  # since previews can occasionally see ad-hoc curl-storms.
  resources:
    requests: { cpu: "50m",  memory: "256Mi" }
    limits:   { cpu: "500m", memory: "1Gi" }

realtime:
  replicas: 1
  spreadAcrossNodes: false
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

storage:
  replicas: 1
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

kong:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

supavisor:
  enabled: false   # not used by chart in current config

edgeFunctions:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }
  e2e:
    enabled: true
    mockGitHub: true

web:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

# ----- Storage backend: in-cluster MinIO, separate bucket per preview --------
# Override storage.s3.bucket in CI to e.g. pawtograder-preview-pr${PR}
# OR share a single bucket across previews (cheaper) — they're sandboxed
# anyway since each release uses a different JWT key.
storage:
  backend: s3
  s3:
    endpoint: https://s3.talos.ripley.cloud
    region: us-east-1
    bucket: pawtograder-previews-shared
    forcePathStyle: true

# ----- Disable admin-side stuff that adds setup complexity -------------------
studio:
  ingressEnabled: false       # port-forward to access if needed
  basicAuth:
    enabled: false            # not autogenerated; use `kubectl port-forward`

backup:
  enabled: false

auditPartitions:
  enabled: false
