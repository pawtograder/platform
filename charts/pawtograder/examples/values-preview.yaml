# Per-PR / per-branch preview overlay.
#
# Usage from CI:
#   helm upgrade --install pawtograder-pr-${PR_NUMBER} \
#     oci://ghcr.io/pawtograder/charts/pawtograder \
#     --version <chart_version> \
#     --namespace pawtograder-preview-pr${PR_NUMBER} \
#     --create-namespace \
#     -f charts/pawtograder/examples/values-preview.yaml \
#     --set global.hostname=pr-${PR_NUMBER}.preview.pawtograder.net \
#     --set web.image.tag=pr-${PR_NUMBER}-${SHORT_SHA} \
#     --set edgeFunctions.image.tag=pr-${PR_NUMBER}-${SHORT_SHA} \
#     --set migrations.image.tag=pr-${PR_NUMBER}-${SHORT_SHA}
#
# On PR close:
#   helm uninstall pawtograder-pr-${PR_NUMBER} --namespace pawtograder-preview-pr${PR_NUMBER}
#   kubectl delete namespace pawtograder-preview-pr${PR_NUMBER}

global:
  # Set per-preview from CI: e.g. pr-123.preview.pawtograder.net
  hostname: REPLACE_PER_PREVIEW.preview.pawtograder.net
  apiOnSeparateHost: true
  # Previews run on the general worker pool, NOT the prod-staging tier.
  # Keep node selectors / tolerations empty.
  nodeSelector: {}
  tolerations: []
  affinity: {}

# Generate fresh secrets in-cluster on first install. No bao, no ESO,
# no manual setup. Each preview gets its own keypair + passwords.
secrets:
  autogenerate: true

# Single Ingress for the chart's main hosts. The cert-manager annotation
# auto-provisions a Certificate per preview from the *.pawtograder.net
# wildcard issuer.
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "55m"
  tls:
    enabled: true
    secretName: pawtograder-preview-tls

# ----- Postgres on shared ceph-rbd (no local SSD) ----------------------------
postgres:
  persistence:
    storageClass: ceph-rbd
    size: 10Gi
  resources:
    # OOMKilled history under E2E load: 2Gi → 4Gi → 8Gi → 16Gi.
    # Theoretical worst case with max_connections=100, work_mem=8MB, and
    # ~3-5 sort/hash nodes per concurrent query is ~12GB just for the
    # backends, ignoring shared_buffers, maintenance_work_mem, OS cache,
    # and the realtime partition-rotation DDL bursts that briefly spike
    # backend count. Stock supabase docker-compose sets no limit at all;
    # 16Gi gives comfortable headroom past the theoretical worst case so
    # the cluster doesn't have to dance around an OOM threshold under
    # E2E concurrency.
    requests: { cpu: "100m", memory: "1Gi" }
    limits:   { cpu: "2",    memory: "16Gi" }
  config:
    # Slower disks → trade durability for throughput. Previews are
    # ephemeral; data loss on crash is fine.
    synchronous_commit: "off"
    fsync: "off"
    full_page_writes: "off"
    max_connections: "100"
    shared_buffers: "256MB"
    effective_cache_size: "1GB"
    work_mem: "8MB"
    maintenance_work_mem: "128MB"
    wal_level: "logical"
    max_wal_senders: "10"
    max_replication_slots: "10"

# ----- Stateless tier: minimal replicas --------------------------------------
auth:
  replicas: 1
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }

rest:
  replicas: 1
  # 1Gi was OOMKilled during round-15 E2E (3 restarts across the
  # session). PostgREST holds schema cache + connection pool +
  # per-request response buffers; under 4-worker Playwright load the
  # multi-MB JSON responses push it past 1Gi. 2Gi gives headroom
  # without bothering to add replicas (cheaper than HA for previews,
  # and OOM-free pgrst doesn't restart so single-replica downtime is a
  # non-issue).
  resources:
    requests: { cpu: "50m",  memory: "256Mi" }
    limits:   { cpu: "500m", memory: "2Gi" }

realtime:
  replicas: 1
  spreadAcrossNodes: false
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

# ----- Storage backend: in-cluster MinIO, separate bucket per preview --------
# Override storage.s3.bucket in CI to e.g. pawtograder-preview-pr${PR}
# OR share a single bucket across previews (cheaper) — they're sandboxed
# anyway since each release uses a different JWT key.
storage:
  replicas: 1
  resources:
    requests: { cpu: "50m",  memory: "128Mi" }
    limits:   { cpu: "500m", memory: "512Mi" }
  backend: s3
  s3:
    endpoint: https://s3.talos.ripley.cloud
    region: us-east-1
    bucket: pawtograder-previews-shared
    forcePathStyle: true

kong:
  replicas: 1
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "1Gi" }

supavisor:
  enabled: false   # not used by chart in current config

edgeFunctions:
  replicas: 1
  # 1Gi was OOMKilled during round-16 E2E. The Deno isolates that the
  # supabase edge-runtime spawns per function don't garbage-collect across
  # cold-start boundaries, and a 4-worker test burst keeps several alive
  # concurrently. 2Gi gives headroom without bothering to add replicas.
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "2Gi" }
  # END_TO_END_SECRET / EDGE_FUNCTION_SECRET come from the chart-rendered
  # pawtograder-e2e secret (templates/secrets.yaml when secrets.create=true
  # AND edgeFunctions.e2e.enabled=true).
  envFromSecrets:
    - pawtograder-e2e
  e2e:
    enabled: true
    mockGitHub: true

# Migration drift handling: previews are ephemeral, so when somebody
# edits an already-applied migration we'd rather wipe + replay than fail
# the deploy. Never set this in prod values.
migrations:
  resetOnDrift: true

web:
  replicas: 1
  # Web pod SIGSEGV'd (exit 139) during round-16 E2E — V8 heap pressure
  # under concurrent test load. 2Gi gives headroom for Next.js SSR
  # workers + concurrent request buffers.
  resources:
    requests: { cpu: "100m", memory: "256Mi" }
    limits:   { cpu: "1",    memory: "2Gi" }
  # E2E suite runs against per-PR previews; flip CSP into report-only
  # mode so Playwright's injected frames don't get blocked.
  e2e:
    enabled: true

# ----- Disable admin-side stuff that adds setup complexity -------------------
studio:
  ingressEnabled: false       # port-forward to access if needed
  basicAuth:
    enabled: false            # not autogenerated; use `kubectl port-forward`

backup:
  enabled: false

auditPartitions:
  enabled: false

# ----- Monitoring ------------------------------------------------------------
# Per-PR previews emit ServiceMonitors auto-discovered by the cluster's
# kube-prometheus-stack Prometheus. Grafana dashboards are loaded by its
# sidecar from any namespace. Logs flow through the cluster-wide Alloy
# DaemonSet (deployed at /home/jon/work/k8s/apps/monitoring/alloy.yaml)
# into the central Loki at loki.monitoring:3100 — no per-preview log
# infra in the chart.
monitoring:
  enabled: true

# Seed the demo class so previews come up with content to play with.
# Idempotent — `seed.sh` skips if classes.id=1 already exists, so PR-sync
# re-runs are no-ops.
seed:
  enabled: true
