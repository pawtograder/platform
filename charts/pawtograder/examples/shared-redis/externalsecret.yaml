# Pulls the shared Redis password from OpenBao. Same Bao path that
# per-PR previews read via the chart's redis-externalsecret template —
# so the password the Redis server uses and the password every preview
# sends are guaranteed to match.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: pawtograder-shared-redis
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: pawtograder-shared-redis
    creationPolicy: Owner
  data:
    # The whole Bao path carries REDIS_URL + redis_password; the StatefulSet
    # only needs the bare password (for redis.conf's requirepass directive),
    # so we extract just that key by name.
    - secretKey: redis_password
      remoteRef:
        key: apps/pawtograder/redis-shared
        property: redis_password
